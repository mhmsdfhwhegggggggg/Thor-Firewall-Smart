version: '3.8'

services:
  # 1. قاعدة البيانات المركزية
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thor
      POSTGRES_PASSWORD: thor_secure_password_123
      POSTGRES_DB: thor_control
    ports:
      - "5432:5432"
    volumes:
      - thor_db_data:/var/lib/postgresql/data
    networks:
      - thor-net

  # 2. ذاكرة التخزين المؤقت (للسرعة الفائقة)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - thor-net

  # 3. خادم التحكم المركزي (Control Plane)
  thor-control-server:
    build:
      context: ./thor-control-plane/crates/thor-control-server
      dockerfile: Dockerfile
    ports:
      - "50051:50051" # gRPC
      - "8080:8080"   # REST API
    environment:
      DATABASE_URL: postgres://thor:thor_secure_password_123@postgres:5432/thor_control
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
    depends_on:
      - postgres
      - redis
    networks:
      - thor-net

  # 4. لوحة التحكم (Dashboard)
  thor-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080
    depends_on:
      - thor-control-server
    networks:
      - thor-net

volumes:
  thor_db_data:

networks:
  thor-net:
    driver: bridge
