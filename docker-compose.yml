version: '3.8'

# =============================================================================
# Thor Firewall Smart — Docker Compose
# REQUIRED: Copy .env.example to .env and fill all values before running
# Run: cp .env.example .env && nano .env
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - thor_db_data:/var/lib/postgresql/data
    networks:
      - thor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - thor-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  thor-control-server:
    build:
      context: ./thor-control-plane/crates/thor-control-server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:50051:50051"
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      THOR_JWT_SECRET: ${THOR_JWT_SECRET}
      THOR_ADMIN_USERNAME: ${THOR_ADMIN_USERNAME}
      THOR_ADMIN_PASSWORD: ${THOR_ADMIN_PASSWORD}
      THOR_AUDIT_DB_PATH: ${THOR_AUDIT_DB_PATH:-/var/lib/thor/audit.db}
      RUST_LOG: ${RUST_LOG:-thor_agent=info,aya=warn}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - thor-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  thor-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080}
    depends_on:
      thor-control-server:
        condition: service_healthy
    networks:
      - thor-net

volumes:
  thor_db_data:

networks:
  thor-net:
    driver: bridge
    internal: false
