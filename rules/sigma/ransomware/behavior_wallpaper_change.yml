title: Ransomware Behavior - Desktop Wallpaper Changed to Ransom Note
id: 5c6cd80e-475c-41fd-9cae-88a33eacb159
status: stable
description: Detects Desktop Wallpaper Changed to Ransom Note behavioral indicator of ransomware activity
author: Thor Security Team
date: 2025/02/01
modified: 2025/06/15
tags:
    - attack.impact
    - attack.t1491.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'SystemParametersInfo.*SPI_SETDESKWALLPAPER'
    condition: selection
falsepositives:
    - Legitimate disk management operations
    - Security testing exercises
level: critical
