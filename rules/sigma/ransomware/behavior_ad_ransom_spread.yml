status: stable
description: Detects AD-Based Ransomware Propagation behavioral indicator of ransomware activity
author: Thor Security Team
date: 2025/02/01
modified: 2025/06/15
tags:
    - attack.impact
    - attack.t1486
logsource:
    category: process_creation
