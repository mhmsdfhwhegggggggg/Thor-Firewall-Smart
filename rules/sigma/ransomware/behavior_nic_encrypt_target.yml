title: Ransomware Behavior - Network Share Encryption Targeting
id: 87d5bcf4-2dec-45ea-a3ee-4d9a1970aaa0
status: stable
description: Detects Network Share Encryption Targeting behavioral indicator of ransomware activity
author: Thor Security Team
date: 2025/02/01
modified: 2025/06/15
tags:
    - attack.impact
    - attack.t1486
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'net use.*\\\\.*encrypt'
    condition: selection
falsepositives:
    - Legitimate disk management operations
    - Security testing exercises
level: critical
