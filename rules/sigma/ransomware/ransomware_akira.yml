title: Akira Ransomware Detection
id: c2bc587a-4e6c-496d-a1cf-4e9e75c561b3
status: stable
description: Detects behavioral indicators of Akira ransomware including encryption patterns, ransom note creation, and shadow copy deletion
author: Thor Security Team
date: 2025/01/01
modified: 2025/06/15
tags:
    - attack.impact
    - attack.t1486
    - attack.t1490
logsource:
    category: process_creation
    product: windows
detection:
    selection_shadow:
        CommandLine|contains:
            - 'vssadmin delete shadows'
            - 'wmic shadowcopy delete'
            - 'bcdedit /set recoveryenabled No'
            - 'wbadmin delete catalog'
    selection_extension:
        TargetFilename|endswith:
            - '.akira'
            - '.encrypted'
            - '.locked'
    condition: 1 of selection_*
falsepositives:
    - Disk cleanup tools
    - Backup management software
level: critical
