title: Ransomware Behavior - Wiper Disguised as Ransomware
id: caa9d506-dfe9-4fcf-91cc-60f9fd7c53d9
status: stable
description: Detects Wiper Disguised as Ransomware behavioral indicator of ransomware activity
author: Thor Security Team
date: 2025/02/01
modified: 2025/06/15
tags:
    - attack.impact
    - attack.t1485
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'WriteFile.*\\\\.\\\\.\\PhysicalDrive'
    condition: selection
falsepositives:
    - Legitimate disk management operations
    - Security testing exercises
level: critical
