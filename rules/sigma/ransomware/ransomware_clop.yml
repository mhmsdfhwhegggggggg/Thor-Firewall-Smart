title: Clop Ransomware Detection
id: 8e549aec-5138-44fb-a2a6-590306fe6ef4
status: stable
description: Detects behavioral indicators of Clop ransomware including encryption patterns, ransom note creation, and shadow copy deletion
author: Thor Security Team
date: 2025/01/01
modified: 2025/06/15
tags:
    - attack.impact
    - attack.t1486
    - attack.t1490
logsource:
    category: process_creation
    product: windows
detection:
    selection_shadow:
        CommandLine|contains:
            - 'vssadmin delete shadows'
            - 'wmic shadowcopy delete'
            - 'bcdedit /set recoveryenabled No'
            - 'wbadmin delete catalog'
    selection_extension:
        TargetFilename|endswith:
            - '.clop'
            - '.encrypted'
            - '.locked'
    condition: 1 of selection_*
falsepositives:
    - Disk cleanup tools
    - Backup management software
level: critical
