title: Ransomware Behavior - Volume Shadow Copy Deletion
id: a57fdd84-fe14-4f2f-85b3-e67d4defaab7
status: stable
description: Detects Volume Shadow Copy Deletion behavioral indicator of ransomware activity
author: Thor Security Team
date: 2025/02/01
modified: 2025/06/15
tags:
    - attack.impact
    - attack.t1490
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'vssadmin.*delete.*shadows'
    condition: selection
falsepositives:
    - Legitimate disk management operations
    - Security testing exercises
level: critical
