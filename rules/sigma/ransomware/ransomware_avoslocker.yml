title: AvosLocker Ransomware Detection
id: dabb82a2-48b5-4555-829e-cdb0b29a965c
status: stable
description: Detects behavioral indicators of AvosLocker ransomware including encryption patterns, ransom note creation, and shadow copy deletion
author: Thor Security Team
date: 2025/01/01
modified: 2025/06/15
tags:
    - attack.impact
    - attack.t1486
    - attack.t1490
logsource:
    category: process_creation
    product: windows
detection:
    selection_shadow:
        CommandLine|contains:
            - 'vssadmin delete shadows'
            - 'wmic shadowcopy delete'
            - 'bcdedit /set recoveryenabled No'
            - 'wbadmin delete catalog'
    selection_extension:
        TargetFilename|endswith:
            - '.avoslocker'
            - '.encrypted'
            - '.locked'
    condition: 1 of selection_*
falsepositives:
    - Disk cleanup tools
    - Backup management software
level: critical
