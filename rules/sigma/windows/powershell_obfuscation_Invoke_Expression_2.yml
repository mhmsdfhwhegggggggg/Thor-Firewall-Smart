title: PowerShell Obfuscation Pattern - Invoke_Expression
id: 822310f6-36c2-40e4-bb2f-6894ee84b6de
status: stable
description: Detects PowerShell using obfuscation or bypass technique involving Invoke-Expression
author: Thor Security Team
date: 2024/10/01
modified: 2025/03/01
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: 'Invoke-Expression'
    filter_admin:
        User|contains:
            - 'SYSTEM'
    condition: selection and not filter_admin
falsepositives:
    - Legitimate PowerShell automation scripts
    - System management tasks
level: high
