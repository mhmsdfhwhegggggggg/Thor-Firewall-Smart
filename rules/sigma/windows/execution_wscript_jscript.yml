title: WScript/CScript Executing Suspicious Scripts
id: 2a2b3c4d-0023-4000-8000-000000000023
status: stable
description: Detects wscript or cscript executing scripts from suspicious locations
author: Thor Security
date: 2025/01/01
tags: [attack.execution, attack.t1059.005]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: ['\wscript.exe', '\cscript.exe']
    CommandLine|contains:
      - 'Temp'
      - 'AppData'
      - 'ProgramData'
      - '%TEMP%'
      - 'http'
  condition: selection
level: high
falsepositives: [Legitimate VBScript/JScript automation]
