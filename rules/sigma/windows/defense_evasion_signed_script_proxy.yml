title: Signed Script Proxy Execution via Microsoft Tools
id: 2a2b3c4d-0049-4000-8000-000000000049
status: stable
description: Detects use of signed Microsoft tools for proxy execution of unsigned code
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1216]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\cmstp.exe'
      - '\syncappvpublishingserver.exe'
      - '\appsyncpublishingserver.exe'
      - '\bginfo.exe'
    CommandLine|contains:
      - 'http'
      - '.inf'
      - '.vbs'
      - '.wsf'
      - '.sct'
  condition: selection
level: high
falsepositives: [Legitimate CMSTP network configuration]
