title: AMSI Bypass Technique
id: 2a2b3c4d-0025-4000-8000-000000000025
status: stable
description: Detects common AMSI bypass techniques used before running malicious PowerShell
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1562.001]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'amsiInitFailed'
      - 'AmsiScanBuffer'
      - 'amsiContext'
      - 'Invoke-AmsiBypass'
      - 'AmsiUtils'
      - '[Ref].Assembly.GetType'
      - 'System.Management.Automation.AmsiUtils'
      - 'amsi.dll'
  condition: selection
level: critical
falsepositives: [Security research, authorized testing]
