title: Timestomping via PowerShell or API
id: 2a2b3c4d-0042-4000-8000-000000000042
status: stable
description: Detects file timestamp manipulation to cover attack tracks on Windows
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1070.006]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'SetCreationTime'
      - 'SetLastWriteTime'
      - 'SetLastAccessTime'
      - 'Invoke-Timestomp'
      - '.CreationTime ='
      - '.LastWriteTime ='
      - 'timestomp'
  condition: selection
level: high
falsepositives: [Backup tools, file synchronization]
