title: PowerShell Obfuscation Pattern - _windowstyle_hidden
id: f4a67f98-2e8f-4814-b6f3-b1704ad7a8ed
status: stable
description: Detects PowerShell using obfuscation or bypass technique involving -windowstyle hidden
author: Thor Security Team
date: 2024/10/01
modified: 2025/03/01
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: '-windowstyle hidden'
    filter_admin:
        User|contains:
            - 'SYSTEM'
    condition: selection and not filter_admin
falsepositives:
    - Legitimate PowerShell automation scripts
    - System management tasks
level: high
