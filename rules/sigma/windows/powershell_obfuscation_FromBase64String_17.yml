title: PowerShell Obfuscation Pattern - FromBase64String
id: 7fdb0e67-d58e-489c-a4ca-d6ea2155850a
status: stable
description: Detects PowerShell using obfuscation or bypass technique involving FromBase64String
author: Thor Security Team
date: 2024/10/01
modified: 2025/03/01
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: 'FromBase64String'
    filter_admin:
        User|contains:
            - 'SYSTEM'
    condition: selection and not filter_admin
falsepositives:
    - Legitimate PowerShell automation scripts
    - System management tasks
level: high
