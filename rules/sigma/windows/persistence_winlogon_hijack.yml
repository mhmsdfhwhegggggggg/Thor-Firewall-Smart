title: Winlogon Helper DLL Hijacking
id: 2a2b3c4d-0024-4000-8000-000000000024
status: stable
description: Detects Winlogon helper DLL modification for persistence
author: Thor Security
date: 2025/01/01
tags: [attack.persistence, attack.t1547.004]
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|contains:
      - '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\Userinit'
      - '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\Shell'
  filter_legit:
    Details: 'C:\Windows\system32\userinit.exe,'
  condition: selection and not filter_legit
level: high
falsepositives: [Very rare — nearly always malicious]
