title: Process Hollowing / Process Replacement
id: 2a2b3c4d-0017-4000-8000-000000000017
status: experimental
description: Detects process hollowing via CreateProcess+WriteProcessMemory+SetThreadContext
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1055.012]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'NtUnmapViewOfSection'
      - 'WriteProcessMemory'
      - 'ResumeThread'
      - 'VirtualAllocEx'
      - 'SetThreadContext'
      - 'Invoke-Hollowing'
      - 'SharpHollow'
  condition: selection
level: high
falsepositives: [Debuggers, security tools]
