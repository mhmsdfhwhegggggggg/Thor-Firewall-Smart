title: InstallUtil AppLocker Bypass
id: 2a2b3c4d-0039-4000-8000-000000000039
status: stable
description: Detects InstallUtil used to bypass AppLocker and execute .NET code
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1218.004]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\installutil.exe'
    CommandLine|contains:
      - '/logfile='
      - '/LogToConsole=false'
      - '/U '
      - 'Temp'
      - 'AppData'
  condition: selection
level: high
falsepositives: [Legitimate .NET application installation]
