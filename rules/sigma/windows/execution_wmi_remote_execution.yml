title: WMI Remote Code Execution
id: 2a2b3c4d-0032-4000-8000-000000000032
status: stable
description: Detects WMI-based remote code execution techniques
author: Thor Security
date: 2025/01/01
tags: [attack.lateral_movement, attack.t1021.006, attack.execution, attack.t1047]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - '/node:'
      - 'process call create'
      - 'os get'
  selection2:
    CommandLine|contains:
      - 'Invoke-WmiMethod'
      - 'Invoke-WMIExec'
      - 'WMIExec'
      - 'PowerSploit'
  condition: selection or selection2
level: high
falsepositives: [Legitimate remote WMI management]
