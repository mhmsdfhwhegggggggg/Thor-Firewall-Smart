title: Regsvr32 Malicious DLL Registration
id: 2a2b3c4d-0051-4000-8000-000000000051
status: stable
description: Detects regsvr32 registering DLLs from suspicious paths
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1218.010]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - 'Temp'
      - 'AppData'
      - 'ProgramData'
      - '\Users\Public'
      - 'C:\Windows\Tasks'
  condition: selection
level: high
falsepositives: [Legitimate COM DLL registration from user paths]
