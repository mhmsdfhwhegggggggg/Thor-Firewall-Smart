title: DLL Side-Loading Detection
id: 2a2b3c4d-0015-4000-8000-000000000015
status: experimental
description: Detects DLL side-loading by monitoring for DLLs loaded from user-writable paths
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1574.002]
logsource:
  category: image_load
  product: windows
detection:
  selection:
    ImageLoaded|contains:
      - '\AppData\'
      - '\Temp\'
      - '\ProgramData\'
      - '\Users\Public\'
    ImageLoaded|endswith: '.dll'
    Signed: false
  filter_whitelisted:
    ImageLoaded|contains:
      - '\AppData\Local\Programs\'
      - '\AppData\Roaming\npm'
  condition: selection and not filter_whitelisted
level: medium
falsepositives: [Portable applications, development environments]
