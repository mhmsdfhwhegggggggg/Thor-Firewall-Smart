title: ODBCConf Proxy Execution (LOLBAS)
id: 2a2b3c4d-0044-4000-8000-000000000044
status: stable
description: Detects odbcconf.exe used to execute arbitrary DLLs bypassing AppLocker
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1218.008]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\odbcconf.exe'
    CommandLine|contains:
      - 'REGSVR '
      - '-f '
      - '/f '
      - 'rsp file'
  condition: selection
level: high
falsepositives: [Legitimate ODBC driver installation]
