title: PowerShell Download Cradle
id: 2a2b3c4d-0012-4000-8000-000000000012
status: stable
description: Detects PowerShell download cradles used to fetch and execute remote payloads
author: Thor Security
date: 2025/01/01
tags: [attack.execution, attack.t1059.001, attack.t1105]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'IEX'
      - 'Invoke-Expression'
      - 'DownloadString'
      - 'Net.WebClient'
      - 'WebRequest'
      - 'Invoke-WebRequest'
      - 'Start-BitsTransfer'
      - '.DownloadFile'
      - 'bitsadmin'
    CommandLine|contains:
      - 'http://'
      - 'https://'
  condition: selection
level: high
falsepositives: [Legitimate software deployment scripts]
