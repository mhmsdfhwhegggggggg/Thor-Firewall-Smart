title: Active Directory Enumeration via LDAP
id: 2a2b3c4d-0031-4000-8000-000000000031
status: stable
description: Detects AD enumeration tools commonly used in reconnaissance
author: Thor Security
date: 2025/01/01
tags: [attack.discovery, attack.t1018]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'Get-ADUser'
      - 'Get-ADGroup'
      - 'Get-ADComputer'
      - 'Get-ADDomain'
      - 'Get-ADTrust'
      - 'net group'
      - 'net user /domain'
      - 'nltest /domain_trusts'
      - 'dsquery'
      - 'dsget'
      - 'adfind'
      - 'ADRecon'
  condition: selection
level: medium
falsepositives: [Domain administrators, helpdesk tools]
