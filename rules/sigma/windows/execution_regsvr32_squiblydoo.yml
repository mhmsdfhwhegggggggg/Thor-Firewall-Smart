title: Regsvr32 Squiblydoo AppLocker Bypass
id: 2a2b3c4d-0027-4000-8000-000000000027
status: stable
description: Detects Squiblydoo technique using regsvr32 to execute remote SCT scripts
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1218.010]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - '/s /n /u /i:'
      - '/s /n /u /i:http'
      - 'scrobj.dll'
  condition: selection
level: high
falsepositives: [Unlikely — this exact pattern is primarily used for attacks]
