title: ETW (Event Tracing for Windows) Bypass
id: 2a2b3c4d-0029-4000-8000-000000000029
status: stable
description: Detects techniques to disable ETW logging — used to blind security tools
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1562.006]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'EtwEventWrite'
      - 'NtTraceEvent'
      - 'ETWBypass'
      - 'Disable-ETW'
      - 'DisableTrace'
      - 'logman delete'
      - 'tracerpt'
  condition: selection
level: high
falsepositives: [Performance testing, authorized security research]
