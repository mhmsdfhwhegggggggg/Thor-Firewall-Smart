title: RDP Session Shadowing
id: 2a2b3c4d-0047-4000-8000-000000000047
status: stable
description: Detects use of RDP session shadowing to monitor user sessions
author: Thor Security
date: 2025/01/01
tags: [attack.lateral_movement, attack.t1563.002]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'mstsc /shadow'
      - 'mstsc.exe /shadow'
      - 'WTSStartRemoteControlSession'
      - 'tscon'
  condition: selection
level: high
falsepositives: [IT support shadowing sessions with user consent]
