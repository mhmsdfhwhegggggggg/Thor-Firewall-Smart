title: DCOM Lateral Movement
id: 2a2b3c4d-0033-4000-8000-000000000033
status: stable
description: Detects use of DCOM for lateral movement (MMC20/ShellWindows/Excel)
author: Thor Security
date: 2025/01/01
tags: [attack.lateral_movement, attack.t1021.003]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'Invoke-DCOMExec'
      - 'MMC20.Application'
      - 'ShellWindows'
      - 'ShellBrowserWindow'
      - 'Excel.Application'
      - '9BA05972-F6A8-11CF-A442-00A0C90A8F39'
      - '00020812-0000-0000-C000-000000000046'
  condition: selection
level: high
falsepositives: [Legitimate COM automation]
