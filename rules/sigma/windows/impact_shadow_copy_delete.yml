title: Volume Shadow Copy Deletion (Ransomware Pattern)
id: 2a2b3c4d-0019-4000-8000-000000000019
status: stable
description: Detects deletion of Volume Shadow Copies — common ransomware indicator
author: Thor Security
date: 2025/01/01
tags: [attack.impact, attack.t1490]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'vssadmin delete shadows'
      - 'vssadmin.exe delete shadows'
      - 'wmic shadowcopy delete'
      - 'wbadmin delete catalog'
      - 'bcdedit /set recoveryenabled no'
      - 'bcdedit.exe /set recoveryenabled no'
      - 'Get-WmiObject Win32_ShadowCopy | Remove-WmiObject'
      - 'Resize-ShadowStorage'
  condition: selection
level: critical
falsepositives: [Authorized disk management operations]
