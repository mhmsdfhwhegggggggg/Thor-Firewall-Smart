title: Clipboard Data Theft
id: 2a2b3c4d-0043-4000-8000-000000000043
status: stable
description: Detects access to Windows clipboard for credential/data theft
author: Thor Security
date: 2025/01/01
tags: [attack.collection, attack.t1115]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'Get-Clipboard'
      - 'Get-Content Clipboard'
      - 'Windows.Forms.Clipboard'
      - 'Clipboard.GetText'
      - 'clip.exe'
      - 'Win32_ClipboardData'
  condition: selection
level: medium
falsepositives: [Clipboard managers, accessibility tools]
