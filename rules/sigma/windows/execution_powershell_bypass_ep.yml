title: PowerShell Execution Policy Bypass
id: 2a2b3c4d-0037-4000-8000-000000000037
status: stable
description: Detects various PowerShell execution policy bypass techniques
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1059.001]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - '-ExecutionPolicy Bypass'
      - '-EP Bypass'
      - '-exec bypass'
      - '-ExecutionPolicy Unrestricted'
      - '-ep unrestricted'
      - 'Set-ExecutionPolicy -Scope CurrentUser -ExecutionPolicy Unrestricted'
      - 'Set-ExecutionPolicy Bypass'
  condition: selection
level: medium
falsepositives: [Some legitimate scripts that need to bypass policy]
