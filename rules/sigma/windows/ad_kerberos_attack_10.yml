title: Kerberos Attack Variant 10
id: 95a5bdbe-0397-44b5-9c73-74d20fc703bf
status: stable
description: Detects Kerberos-based attack technique variant 10 including ticket manipulation and SPN enumeration
author: Thor Security Team
date: 2024/06/01
modified: 2025/01/15
tags:
    - attack.credential_access
    - attack.t1558.003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'kerberoast'
            - '-ServiceName'
            - 'Get-NetUser -SPN'
            - 'Invoke-Kerberoast'
            - 'Request-SPNTicket'
            - 'Add-Type -AssemblyName System.IdentityModel'
    condition: selection
falsepositives:
    - Legitimate AD management scripts by domain admins
level: high
