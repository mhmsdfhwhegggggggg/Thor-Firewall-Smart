title: Living Off The Land Binary (LOLBAS) Execution
id: 2a2b3c4d-0011-4000-8000-000000000011
status: stable
description: Detects abuse of Windows trusted binaries for malicious execution (LOLBAS)
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1218]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\certutil.exe'
      - '\wmic.exe'
      - '\mshta.exe'
      - '\cmstp.exe'
      - '\installutil.exe'
      - '\ieexec.exe'
      - '\msconfig.exe'
      - '\msiexec.exe'
      - '\odbcconf.exe'
      - '\pcalua.exe'
      - '\regsvcs.exe'
      - '\regasm.exe'
      - '\csc.exe'
    CommandLine|contains:
      - 'http'
      - 'ftp'
      - '/url'
      - '-url'
  condition: selection
level: high
falsepositives: [Some software installers]
