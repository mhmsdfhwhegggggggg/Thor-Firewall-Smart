title: NTDS.dit Active Directory Database Extraction
id: 2a2b3c4d-0020-4000-8000-000000000020
status: stable
description: Detects extraction of NTDS.dit database containing all AD credential hashes
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1003.003]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'ntds.dit'
      - 'ntdsutil'
      - 'vssadmin.*ntds'
      - 'copy.*ntds.dit'
      - 'IFM'
      - 'Create Full'
      - 'SYSTEM.*ntds'
  condition: selection
level: critical
falsepositives: [Authorized AD backup and recovery]
