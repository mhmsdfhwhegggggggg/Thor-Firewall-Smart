title: verclsid.exe Proxy Execution (LOLBAS)
id: 2a2b3c4d-0046-4000-8000-000000000046
status: experimental
description: Detects verclsid.exe used for proxy execution of malicious COM objects
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1218]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\verclsid.exe'
    CommandLine|contains:
      - '/S /C '
      - '{GUID}'
  condition: selection
level: high
falsepositives: [Shell Extension verification]
