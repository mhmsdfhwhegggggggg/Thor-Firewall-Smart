title: Certutil Used to Decode or Download Payload
id: 2a2b3c4d-0035-4000-8000-000000000035
status: stable
description: Detects certutil abuse for payload decoding or downloading
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1140, attack.command_and_control, attack.t1105]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-decode'
      - '-decodehex'
      - '-urlcache'
      - '-split'
      - '-f http'
      - '-f https'
      - 'decode'
  condition: selection
level: high
falsepositives: [Certificate management operations]
