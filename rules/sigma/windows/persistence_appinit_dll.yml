title: AppInit_DLLs Persistence
id: 2a2b3c4d-0038-4000-8000-000000000038
status: stable
description: Detects modification of AppInit_DLLs registry key for DLL injection persistence
author: Thor Security
date: 2025/01/01
tags: [attack.persistence, attack.t1546.010]
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|contains:
      - '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows\AppInit_DLLs'
      - '\SOFTWARE\Wow6432Node\Microsoft\Windows NT\CurrentVersion\Windows\AppInit_DLLs'
  condition: selection
level: high
falsepositives: [Legitimate third-party software (rare)]
