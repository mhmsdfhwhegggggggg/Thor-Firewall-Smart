status: stable
description: Detects AS-REP Roasting against Active Directory infrastructure
author: Thor Security Team
date: 2024/07/01
modified: 2025/02/28
tags:
    - attack.discovery
    - attack.credential_access
    - attack.t1558.004
logsource:
    category: process_creation
