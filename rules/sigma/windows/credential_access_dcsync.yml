title: DCSync Attack
id: 2a2b3c4d-0006-4000-8000-000000000006
status: stable
description: Detects DCSync attack to replicate Active Directory passwords
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1003/006/
tags:
  - attack.credential_access
  - attack.t1003.006
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'lsadump::dcsync'
      - 'dcsync'
      - '/domain:'
      - '/user:krbtgt'
      - 'secretsdump'
      - 'impacket-secretsdump'
      - 'drsuapi'
  condition: selection
level: critical
falsepositives:
  - Domain controllers replication (via LDAP, not command line)
