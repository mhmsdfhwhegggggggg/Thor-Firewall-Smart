title: LSASS Memory Dump
id: 2a2b3c4d-0002-4000-8000-000000000002
status: stable
description: Detects various LSASS memory dumping techniques for credential access
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1003/001/
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection_tools:
    CommandLine|contains:
      - 'sekurlsa'
      - 'lsadump'
      - 'procdump.*lsass'
      - 'comsvcs.dll,MiniDump'
      - 'comsvcs.dll MiniDump'
      - 'Out-Minidump'
      - 'NanoDump'
      - 'PPLBlade'
      - 'lsass.exe'
    CommandLine|contains:
      - 'dump'
      - 'dmp'
  selection_access:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x147a'
      - '0x143a'
  condition: selection_tools or selection_access
level: critical
falsepositives:
  - AV/EDR products
  - Windows Defender
