title: Msiexec Loading Remote MSI Package
id: 2a2b3c4d-0030-4000-8000-000000000030
status: stable
description: Detects msiexec loading MSI packages from remote URLs (drive-by install)
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1218.007]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\msiexec.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'ftp://'
      - '/i http'
      - '/q http'
  condition: selection
level: high
falsepositives: [Some software deployment systems]
