title: AS-REP Roasting Attack
id: 2a2b3c4d-0005-4000-8000-000000000005
status: stable
description: Detects AS-REP Roasting against accounts without pre-authentication required
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1558/004/
tags:
  - attack.credential_access
  - attack.t1558.004
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'Invoke-ASREPRoast'
      - 'Rubeus asreproast'
      - 'GetNPUsers'
      - 'impacket-GetNPUsers'
      - 'krb5asrep'
      - 'RC4_HMAC'
      - 'DONT_REQ_PREAUTH'
  condition: selection
level: high
falsepositives:
  - Authorized penetration testing
