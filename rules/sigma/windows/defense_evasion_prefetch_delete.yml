title: Prefetch Files Deleted to Cover Tracks
id: 2a2b3c4d-0022-4000-8000-000000000022
status: stable
description: Detects deletion of prefetch files to remove evidence of program execution
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1070.004]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'del /s /q C:\Windows\Prefetch'
      - 'Remove-Item.*Prefetch'
      - 'rd /s /q C:\Windows\Prefetch'
      - 'wevtutil cl'
      - 'Clear-EventLog'
  condition: selection
level: high
falsepositives: [Authorized cleanup tools]
