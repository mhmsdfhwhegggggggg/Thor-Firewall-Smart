title: LSA Protection Disabled
id: 2a2b3c4d-0034-4000-8000-000000000034
status: stable
description: Detects disabling of LSA protection — required for some credential dumping techniques
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.defense_evasion, attack.t1556.002]
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|contains:
      - '\SYSTEM\CurrentControlSet\Control\Lsa\RunAsPPL'
    Details: '0'
  condition: selection
level: critical
falsepositives: [Authorized security testing]
