title: Active Directory - AD Password Spray
id: 06953604-c294-426d-9de4-be0c3102132c
status: stable
description: Detects AD Password Spray against Active Directory infrastructure
author: Thor Security Team
date: 2024/07/01
modified: 2025/02/28
tags:
    - attack.discovery
    - attack.credential_access
    - attack.t1110.003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'Invoke-SprayEmptyPassword'
            - 'DomainPasswordSpray'
    condition: selection
falsepositives:
    - Authorized penetration testing
    - IT security audits
level: high
