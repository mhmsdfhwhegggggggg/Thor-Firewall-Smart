title: Network Share Discovery
id: 2a2b3c4d-0040-4000-8000-000000000040
status: stable
description: Detects enumeration of network shares — used for lateral movement/data theft
author: Thor Security
date: 2025/01/01
tags: [attack.discovery, attack.t1135]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'net share'
      - 'net view'
      - 'Get-WmiObject Win32_Share'
      - 'Get-SmbShare'
      - 'Invoke-ShareFinder'
      - 'netscan'
  condition: selection
level: low
falsepositives: [Helpdesk, system administrators]
