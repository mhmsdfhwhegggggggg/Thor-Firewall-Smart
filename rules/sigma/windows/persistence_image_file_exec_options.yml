title: Image File Execution Options (IFEO) Debugger Hijack
id: 2a2b3c4d-0041-4000-8000-000000000041
status: stable
description: Detects modification of IFEO registry key to intercept process execution
author: Thor Security
date: 2025/01/01
tags: [attack.persistence, attack.t1546.012, attack.defense_evasion]
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    TargetObject|contains:
      - '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\'
    TargetObject|endswith: '\Debugger'
  filter_legit:
    Details|contains: ['vsjitdebugger.exe', 'windbg.exe', 'ntsd.exe']
  condition: selection and not filter_legit
level: high
falsepositives: [Debugging tools, accessibility feature bypass]
