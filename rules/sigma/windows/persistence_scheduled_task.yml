title: Scheduled Task Created for Persistence
id: 2a2b3c4d-0013-4000-8000-000000000013
status: stable
description: Detects creation of scheduled tasks pointing to suspicious locations
author: Thor Security
date: 2025/01/01
tags: [attack.persistence, attack.t1053.005]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: ['\schtasks.exe', '\at.exe']
    CommandLine|contains: ['/create', '/sc', '/tr', '/ru system']
    CommandLine|contains:
      - 'Temp'
      - 'AppData'
      - 'ProgramData'
      - 'C:\Users\Public'
      - 'http'
      - 'powershell'
      - 'cmd /c'
  condition: selection
level: high
falsepositives: [Legitimate scheduled maintenance tasks]
