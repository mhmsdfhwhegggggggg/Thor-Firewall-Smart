title: Kerberoasting Attack
id: 2a2b3c4d-0004-4000-8000-000000000004
status: stable
description: Detects Kerberoasting — requesting service tickets for offline cracking
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1558/003/
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'Invoke-Kerberoast'
      - 'GetUserSPNs'
      - 'Rubeus kerberoast'
      - 'Rubeus.exe kerberoast'
      - 'KerberosRequestorSecurityToken'
      - 'setspn -T'
      - 'impacket-GetUserSPNs'
  condition: selection
level: high
falsepositives:
  - Security auditing tools
