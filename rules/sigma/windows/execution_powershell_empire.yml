title: PowerShell Empire Agent Indicators
id: 2a2b3c4d-0050-4000-8000-000000000050
status: stable
description: Detects PowerShell Empire agent execution indicators
author: Thor Security
date: 2025/01/01
tags: [attack.execution, attack.t1059.001, attack.command_and_control, attack.t1071.001]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'Get-EMpire'
      - 'Empire launcher'
      - 'powershell/code_execution'
      - 'HKCU:SOFTWARE\\'
      - 'Invoke-Shellcode'
      - 'Invoke-PsExec'
      - '$True,$True,$True'
  condition: selection
level: critical
falsepositives: [Authorized red team operations]
