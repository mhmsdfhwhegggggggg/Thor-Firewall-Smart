title: DPAPI Key Material Access
id: 2a2b3c4d-0016-4000-8000-000000000016
status: stable
description: Detects access to DPAPI master keys used for credential decryption
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1555.004]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'dpapi::masterkey'
      - 'dpapi::cred'
      - 'dpapi::chrome'
      - 'dpapi::rdg'
      - 'dpapi::wifi'
      - 'Unprotect-CmsMessage'
      - 'CryptUnprotectData'
      - 'SharpDPAPI'
      - 'mimikatz.*dpapi'
  condition: selection
level: high
falsepositives: [Authorized DPAPI operations by apps]
