title: PowerShell Obfuscation Pattern - _EncodedCommand
id: a9372420-91a0-40c8-9b58-b0de40b3691f
status: stable
description: Detects PowerShell using obfuscation or bypass technique involving -EncodedCommand
author: Thor Security Team
date: 2024/10/01
modified: 2025/03/01
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: '-EncodedCommand'
    filter_admin:
        User|contains:
            - 'SYSTEM'
    condition: selection and not filter_admin
falsepositives:
    - Legitimate PowerShell automation scripts
    - System management tasks
level: high
