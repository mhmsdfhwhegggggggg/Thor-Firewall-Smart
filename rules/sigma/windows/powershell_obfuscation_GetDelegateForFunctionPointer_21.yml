title: PowerShell Obfuscation Pattern - GetDelegateForFunctionPointer
id: e0f7b9df-900b-4830-9e67-703d7f82386d
status: stable
description: Detects PowerShell using obfuscation or bypass technique involving GetDelegateForFunctionPointer
author: Thor Security Team
date: 2024/10/01
modified: 2025/03/01
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: 'GetDelegateForFunctionPointer'
    filter_admin:
        User|contains:
            - 'SYSTEM'
    condition: selection and not filter_admin
falsepositives:
    - Legitimate PowerShell automation scripts
    - System management tasks
level: high
