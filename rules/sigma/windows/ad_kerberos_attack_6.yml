title: Kerberos Attack Variant 6
id: 13954e2b-1368-4af7-8a4f-68b643e961de
status: stable
description: Detects Kerberos-based attack technique variant 6 including ticket manipulation and SPN enumeration
author: Thor Security Team
date: 2024/06/01
modified: 2025/01/15
tags:
    - attack.credential_access
    - attack.t1558.003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains:
            - 'kerberoast'
            - '-ServiceName'
            - 'Get-NetUser -SPN'
            - 'Invoke-Kerberoast'
            - 'Request-SPNTicket'
            - 'Add-Type -AssemblyName System.IdentityModel'
    condition: selection
falsepositives:
    - Legitimate AD management scripts by domain admins
level: high
