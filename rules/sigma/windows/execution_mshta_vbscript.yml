title: MSHTA VBScript/JavaScript Execution
id: 2a2b3c4d-0021-4000-8000-000000000021
status: stable
description: Detects MSHTA executing inline VBScript or JavaScript for code execution
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1218.005]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'vbscript:'
      - 'javascript:'
      - 'http://'
      - 'https://'
      - '.hta'
  condition: selection
level: high
falsepositives: [Legacy HTA applications]
