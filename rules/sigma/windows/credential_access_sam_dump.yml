title: SAM Database Dump
id: 2a2b3c4d-0026-4000-8000-000000000026
status: stable
description: Detects SAM registry hive dumping for local account credential extraction
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1003.002]
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'reg save hklm\sam'
      - 'reg save HKLM\SAM'
      - 'reg export HKLM\SAM'
      - 'esentutl.*sam'
      - 'hashdump'
      - 'samdump2'
      - 'fgdump'
      - 'pwdump'
  condition: selection
level: critical
falsepositives: [Authorized backup operations (rare)]
