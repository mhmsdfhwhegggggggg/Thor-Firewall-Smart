title: Pass-the-Hash via Mimikatz or Impacket
id: 2a2b3c4d-0003-4000-8000-000000000003
status: stable
description: Detects pass-the-hash attacks using Mimikatz pth module or Impacket
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1550/002/
tags:
  - attack.lateral_movement
  - attack.t1550.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'sekurlsa::pth'
      - 'pth-winexe'
      - 'crackmapexec'
      - 'impacket'
      - 'wmiexec.py'
      - 'smbexec.py'
      - 'psexec.py'
      - '-hashes'
      - 'NTLM:'
  condition: selection
level: critical
falsepositives:
  - Authorized penetration testing
