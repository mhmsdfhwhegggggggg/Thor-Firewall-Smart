title: PowerShell Obfuscation Pattern - DownloadFile
id: 7f6ac270-5b4b-4d91-af4a-a00744cd7b0a
status: stable
description: Detects PowerShell using obfuscation or bypass technique involving DownloadFile
author: Thor Security Team
date: 2024/10/01
modified: 2025/03/01
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: 'DownloadFile'
    filter_admin:
        User|contains:
            - 'SYSTEM'
    condition: selection and not filter_admin
falsepositives:
    - Legitimate PowerShell automation scripts
    - System management tasks
level: high
