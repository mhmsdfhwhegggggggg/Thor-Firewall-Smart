title: Container Escape - runc Container Escape
id: fcb48462-313d-497e-90d1-de8c832bf3ae
status: stable
description: Detects runc Container Escape container escape technique
author: Thor Security Team
date: 2024/06/15
modified: 2025/03/01
tags:
    - attack.privilege_escalation
    - attack.lateral_movement
    - attack.t1611
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - '/proc/self/exe'
            - 'runc init'
    condition: selection
falsepositives:
    - Container administrators with legitimate privileged access
    - Security testing environments
level: critical
