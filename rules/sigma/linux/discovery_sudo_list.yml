title: Sudo Privilege Enumeration
id: 1a2b3c4d-0055-4000-8000-000000000055
status: stable
description: Detects enumeration of sudo privileges for privilege escalation discovery
author: Thor Security
date: 2025/01/01
tags: [attack.discovery, attack.t1548.003]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'sudo -l'
      - 'sudo -ll'
      - 'sudo --list'
      - 'cat /etc/sudoers'
      - 'sudoedit -l'
  condition: selection
level: medium
falsepositives: [System administrators checking own privileges]
