title: Linux Internal Recon Script
id: a9b1c2d3-e4f5-6789-abcd-ef0123456789
status: stable
description: Detects internal network reconnaissance scripts on Linux
author: Thor Security Team
date: 2025/01/01
modified: 2025/06/01
tags:
    - attack.discovery
    - attack.t1590
logsource:
    category: process_creation
    product: linux
detection:
    selection_ping_sweep:
        CommandLine|contains|all:
            - 'ping'
            - '-c 1'
    selection_seq_scan:
        CommandLine|contains|all:
            - 'seq '
            - 'ping'
    condition: 1 of selection_*
falsepositives:
    - Network monitoring scripts
level: low
