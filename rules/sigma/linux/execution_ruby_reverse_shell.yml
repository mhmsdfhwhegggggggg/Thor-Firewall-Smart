title: Ruby/Perl Reverse Shell Execution
id: 1a2b3c4d-0033-4000-8000-000000000033
status: stable
description: Detects reverse shell payloads written in Ruby or Perl
author: Thor Security
date: 2025/01/01
tags: [attack.execution, attack.t1059.006]
logsource:
  category: process_creation
  product: linux
detection:
  selection_ruby:
    CommandLine|contains:
      - 'ruby -rsocket'
      - 'TCPSocket.new'
      - 'IO.popen'
      - '$stdout.reopen'
  selection_perl:
    CommandLine|contains:
      - 'perl -e'
      - 'use Socket'
      - '$sock=IO::Socket::INET'
      - 'exec("/bin/bash")'
  condition: selection_ruby or selection_perl
level: high
falsepositives: [Ruby/Perl network scripts]
