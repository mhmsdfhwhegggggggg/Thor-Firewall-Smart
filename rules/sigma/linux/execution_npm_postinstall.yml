title: Malicious npm/pip Package Execution via postinstall
id: 1a2b3c4d-0046-4000-8000-000000000046
status: experimental
description: Detects suspicious commands executed via npm postinstall or pip setup.py
author: Thor Security
date: 2025/01/01
tags: [attack.execution, attack.t1195.001]
logsource:
  category: process_creation
  product: linux
detection:
  selection_parent:
    ParentCommandLine|contains:
      - 'npm install'
      - 'npm ci'
      - 'pip install'
      - 'python setup.py install'
  selection_child:
    CommandLine|contains:
      - 'curl'
      - 'wget'
      - 'bash'
      - 'sh -c'
      - 'python -c'
  condition: selection_parent and selection_child
level: high
falsepositives: [Some legitimate packages with install scripts]
