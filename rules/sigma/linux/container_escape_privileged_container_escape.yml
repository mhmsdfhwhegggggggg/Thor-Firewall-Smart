title: Container Escape - Privileged Container Escape
id: 6bf13801-4dab-41d4-a8ee-fdb23443597f
status: stable
description: Detects Privileged Container Escape container escape technique
author: Thor Security Team
date: 2024/06/15
modified: 2025/03/01
tags:
    - attack.privilege_escalation
    - attack.lateral_movement
    - attack.t1611
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - 'docker run --privileged'
            - 'nsenter --mount=/proc/1/ns/mnt'
    condition: selection
falsepositives:
    - Container administrators with legitimate privileged access
    - Security testing environments
level: critical
