title: AWS Instance Metadata Service Abuse
id: a1b2c3d4-0032-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects access to AWS IMDS (Instance Metadata Service) for credential theft
level: critical
author: Thor Security Team
date: 2024-01-01
logsource:
  category: network_connection
  product: linux
detection:
  selection:
    dst_ip: '169.254.169.254'
    CommandLine|contains:
      - 'iam/security-credentials'
      - 'meta-data/iam'
      - 'latest/meta-data'
      - '169.254.169.254'
  condition: selection
tags:
  - attack.credential_access
  - attack.t1552.005
  - attack.discovery
  - attack.t1580
