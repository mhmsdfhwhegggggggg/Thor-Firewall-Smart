title: Backdoor via /etc/update-motd.d
id: 1a2b3c4d-0012-4000-8000-000000000012
status: stable
description: Detects modification of MOTD scripts for code execution on SSH login
author: Thor Security
date: 2025/01/01
tags: [attack.persistence, attack.t1037.004]
logsource:
  category: file_event
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '/etc/update-motd.d/'
      - '/etc/motd.d/'
      - '/etc/profile.d/'
      - '/etc/bash.bashrc'
      - '/etc/profile'
  condition: selection
level: high
falsepositives: [Legitimate MOTD customization]
