status: stable
description: Detects Seccomp Profile Bypass container escape technique
author: Thor Security Team
date: 2024/06/15
modified: 2025/03/01
tags:
    - attack.privilege_escalation
    - attack.lateral_movement
    - attack.t1059
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - 'unshare --user'
            - 'unshare -r'
    condition: selection
