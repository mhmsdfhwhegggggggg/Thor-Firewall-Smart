title: Web Server Spawning Suspicious Child Process
id: 1a2b3c4d-0026-4000-8000-000000000026
status: stable
description: Detects web server processes (Apache/Nginx/PHP) spawning shells or download tools
author: Thor Security
date: 2025/01/01
tags: [attack.execution, attack.t1059.004, attack.initial_access, attack.t1190]
logsource:
  category: process_creation
  product: linux
detection:
  selection_parent:
    ParentImage|contains:
      - 'apache2'
      - 'httpd'
      - 'nginx'
      - 'php-fpm'
      - 'php'
      - 'tomcat'
      - 'java'
      - 'python'
      - 'node'
      - 'ruby'
  selection_child:
    Image|endswith:
      - '/bash'
      - '/sh'
      - '/dash'
      - '/curl'
      - '/wget'
      - '/nc'
      - '/ncat'
      - '/python3'
      - '/perl'
  condition: selection_parent and selection_child
level: high
falsepositives: [Some web frameworks with shell helpers]
