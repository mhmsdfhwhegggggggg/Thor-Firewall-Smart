title: Linux Discovery - Password File Enumeration
id: 82fa8ef9-c6f2-4ec9-a81d-fb50702bb0df
status: stable
description: Detects Password File Enumeration on Linux systems
author: Thor Security Team
date: 2025/01/01
modified: 2025/06/01
tags:
    - attack.discovery
    - attack.t1201
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains: 'getent passwd'
    condition: selection
falsepositives:
    - System administrators performing audits
level: low
