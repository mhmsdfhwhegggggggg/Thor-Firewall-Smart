title: SELinux or AppArmor Mandatory Access Control Disabled
id: 1a2b3c4d-0025-4000-8000-000000000025
status: stable
description: Detects disabling of SELinux or AppArmor MAC — defense evasion
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1562.006]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'setenforce 0'
      - 'setenforce Permissive'
      - 'aa-disable'
      - 'apparmor_status'
      - 'systemctl disable apparmor'
      - 'systemctl disable selinux'
      - 'SELINUX=disabled'
  condition: selection
level: high
falsepositives: [Authorized security configuration changes]
