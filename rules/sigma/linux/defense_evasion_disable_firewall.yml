title: Linux Firewall Disabled (iptables/ufw/firewalld)
id: 1a2b3c4d-0050-4000-8000-000000000050
status: stable
description: Detects disabling of Linux firewall — allows unrestricted network access
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1562.004]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'iptables -F'
      - 'iptables --flush'
      - 'ufw disable'
      - 'ufw --force disable'
      - 'systemctl stop firewalld'
      - 'systemctl disable firewalld'
      - 'service iptables stop'
      - 'nft flush ruleset'
  condition: selection
level: high
falsepositives: [Authorized network configuration changes]
