title: Script or Binary Executed from /tmp or /dev/shm
id: a1b2c3d4-0016-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects execution of files from temporary directories — common malware staging area
level: high
author: Thor Security Team
date: 2024-01-01
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|startswith:
      - '/tmp/'
      - '/dev/shm/'
      - '/var/tmp/'
      - '/run/user/'
      - '/dev/mqueue/'
  condition: selection
falsepositives:
  - Some containerized environments
  - Build tools
tags:
  - attack.defense_evasion
  - attack.t1036.005
  - attack.execution
