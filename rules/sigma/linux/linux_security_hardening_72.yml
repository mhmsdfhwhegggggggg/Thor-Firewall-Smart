title: Linux Security Hardening Violation 72
id: 5aec6d2d-604d-4bf9-921b-15bda7b1a9cb
status: stable
description: Detects violation of Linux security hardening baseline control 72 - CIS Benchmark Level 2 compliance check
author: Thor Security Team
date: 2025/05/01
modified: 2025/06/15
tags:
    - attack.defense_evasion
    - attack.t1562
logsource:
    category: process_creation
    product: linux
detection:
    selection_disable_fw:
        CommandLine|contains:
            - 'iptables -F'
            - 'ufw disable'
            - 'systemctl stop firewalld'
    selection_disable_audit:
        CommandLine|contains:
            - 'service auditd stop'
            - 'systemctl disable auditd'
    condition: 1 of selection_*
falsepositives:
    - Authorized system maintenance
level: medium
