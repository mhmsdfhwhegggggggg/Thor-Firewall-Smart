title: Cloud Provider Credential Enumeration in CI/CD
id: 1a2b3c4d-0059-4000-8000-000000000059
status: experimental
description: Detects enumeration of cloud credentials in CI/CD and container environments
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1552.004]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'env | grep AWS'
      - 'env | grep AZURE'
      - 'env | grep GCP'
      - 'env | grep TOKEN'
      - 'env | grep KEY'
      - 'printenv AWS'
      - 'printenv GOOGLE'
      - 'printenv AZURE'
  condition: selection
level: medium
falsepositives: [CI/CD debugging, legitimate cloud CLI usage]
