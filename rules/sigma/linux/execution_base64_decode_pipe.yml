title: Suspicious Base64 Encoded Command Execution
id: a1b2c3d4-0003-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects base64-encoded command execution — common obfuscation technique
level: high
author: Thor Security Team
date: 2024-01-01
logsource:
  category: process_creation
  product: linux
detection:
  selection_base64:
    CommandLine|contains:
      - 'base64 -d'
      - 'base64 --decode'
      - '| base64 -d |'
      - 'base64 -di'
  selection_exec:
    CommandLine|contains:
      - '| bash'
      - '| sh'
      - '| python'
      - '| perl'
      - 'eval'
  condition: selection_base64 and selection_exec
falsepositives:
  - Legitimate scripts using base64 encoding
tags:
  - attack.defense_evasion
  - attack.t1027
  - attack.execution
  - attack.t1059.004
