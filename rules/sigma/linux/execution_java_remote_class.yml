title: Java Remote Class Loading (Log4Shell / JNDI Injection)
id: 1a2b3c4d-0037-4000-8000-000000000037
status: stable
description: Detects Java loading classes from remote LDAP/RMI/DNS servers (Log4Shell pattern)
author: Thor Security
date: 2025/01/01
tags: [attack.initial_access, attack.t1190]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'com.sun.jndi.ldap.object.trustURLCodebase'
      - 'com.sun.jndi.rmi.object.trustURLCodebase'
      - '-Dlog4j2.formatMsgNoLookups'
      - 'jndi:ldap://'
      - 'jndi:rmi://'
      - 'jndi:dns://'
      - '${jndi:'
  condition: selection
level: critical
falsepositives: [Legitimate JNDI usage in Java EE]
