title: Ransomware Activity Indicators
id: a1b2c3d4-0021-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects file system activity patterns associated with ransomware encryption
level: critical
author: Thor Security Team
date: 2024-01-01
logsource:
  category: process_creation
  product: linux
detection:
  selection_find_enc:
    CommandLine|contains:
      - 'find / -name'
      - 'find . -name'
      - 'openssl enc'
      - 'gpg --encrypt'
      - 'tar -czf'
  selection_mass:
    CommandLine|contains:
      - '*.docx'
      - '*.pdf'
      - '*.xlsx'
      - '*.jpg'
      - '*.png'
      - '*.db'
      - '*.sql'
  condition: selection_find_enc and selection_mass
tags:
  - attack.impact
  - attack.t1486
