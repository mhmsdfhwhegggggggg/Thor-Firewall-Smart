title: Shell Spawned from Unusual Parent Process
id: a1b2c3d4-0002-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects shell spawned from web servers, databases or other unexpected parent processes (web shell indicator)
level: critical
author: Thor Security Team
date: 2024-01-01
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    ParentImage|contains:
      - 'apache2'
      - 'nginx'
      - 'httpd'
      - 'php-fpm'
      - 'python'
      - 'ruby'
      - 'node'
      - 'mysqld'
      - 'postgres'
      - 'mongod'
    Image|endswith:
      - '/bash'
      - '/sh'
      - '/dash'
      - '/zsh'
      - '/ksh'
  condition: selection
falsepositives:
  - Legitimate web application management
tags:
  - attack.execution
  - attack.t1059.004
  - attack.initial_access
  - attack.t1190
