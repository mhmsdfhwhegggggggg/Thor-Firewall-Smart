title: Linux Privilege Escalation - Cron Job Privilege Escalation
id: 37ab004c-bc00-464a-a74b-51748eddd881
status: stable
description: Detects Cron Job Privilege Escalation privilege escalation technique
author: Thor Security Team
date: 2024/09/15
modified: 2025/04/01
tags:
    - attack.privilege_escalation
    - attack.t1053.003
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - 'crontab.*tmp/.*\.sh'
            - '*/1 * * * * root'
    condition: selection
falsepositives:
    - System administrators performing legitimate maintenance
level: high
