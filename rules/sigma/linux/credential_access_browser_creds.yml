title: Browser Credential Database Access
id: 1a2b3c4d-0036-4000-8000-000000000036
status: stable
description: Detects access to browser credential stores for password theft
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1555.003]
logsource:
  category: file_access
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '/.mozilla/firefox/'
      - '/.config/google-chrome/'
      - '/.config/chromium/'
      - '/.config/BraveSoftware/'
      - 'Login Data'
      - 'Cookies'
      - 'key3.db'
      - 'key4.db'
      - 'logins.json'
      - 'cert9.db'
  condition: selection
level: high
falsepositives: [Browser backup tools, password managers]
