title: Sensitive Password File Discovery
id: 1a2b3c4d-0049-4000-8000-000000000049
status: stable
description: Detects enumeration of password-containing files and configs
author: Thor Security
date: 2025/01/01
tags: [attack.discovery, attack.t1083, attack.credential_access, attack.t1552.001]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'find.*password'
      - 'grep.*password'
      - 'grep.*passwd'
      - 'grep.*secret'
      - 'grep.*api.key'
      - 'grep.*token'
      - 'locate.*password'
      - 'find.*\.env'
    CommandLine|contains:
      - '/etc/'
      - '/home/'
      - '/var/'
      - '/opt/'
  condition: selection
level: medium
falsepositives: [Security auditing, password managers]
