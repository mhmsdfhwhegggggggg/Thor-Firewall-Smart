title: SSH Key Harvesting via ssh-keyscan
id: a1b2c3d4-0035-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects use of ssh-keyscan to harvest SSH host keys for lateral movement
level: medium
author: Thor Security Team
date: 2024-01-01
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|endswith:
      - '/ssh-keyscan'
    CommandLine|contains:
      - '-t rsa'
      - '-t ecdsa'
      - '-H'
      - '-f '
  condition: selection
tags:
  - attack.credential_access
  - attack.lateral_movement
  - attack.t1018
  - attack.t1021.004
