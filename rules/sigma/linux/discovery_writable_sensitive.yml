title: Discovery of World-Writable Sensitive Files
id: 1a2b3c4d-0013-4000-8000-000000000013
status: experimental
description: Detects enumeration of world-writable files for privilege escalation
author: Thor Security
date: 2025/01/01
tags: [attack.discovery, attack.t1083]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'find / -perm -2'
      - 'find / -perm -o+w'
      - 'find / -writable'
      - 'find . -perm 777'
      - 'find / -type f -perm'
  condition: selection
level: medium
falsepositives: [Security auditing tools]
