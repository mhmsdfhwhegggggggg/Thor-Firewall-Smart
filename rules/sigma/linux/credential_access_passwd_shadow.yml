title: Unauthorized Access to /etc/passwd or /etc/shadow
id: a1b2c3d4-0001-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects unauthorized read access to /etc/passwd or /etc/shadow which contain credential hashes
level: high
author: Thor Security Team
date: 2024-01-01
logsource:
  category: file_access
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '/etc/passwd'
      - '/etc/shadow'
      - '/etc/gshadow'
      - '/etc/master.passwd'
  condition: selection
falsepositives:
  - Administrative tools
  - Configuration management (Puppet, Ansible)
tags:
  - attack.credential_access
  - attack.t1003.008
