title: SUID/SGID Bit Set on File
id: a1b2c3d4-0008-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects chmod commands setting SUID/SGID bits — can lead to privilege escalation
level: high
author: Thor Security Team
date: 2024-01-01
logsource:
  category: process_creation
  product: linux
detection:
  selection_chmod:
    Image|endswith:
      - '/chmod'
  selection_suid:
    CommandLine|contains:
      - 'chmod +s'
      - 'chmod 4'
      - 'chmod 2'
      - 'chmod u+s'
      - 'chmod g+s'
  condition: selection_chmod and selection_suid
falsepositives:
  - Package installations
  - Legitimate binary deployments
tags:
  - attack.privilege_escalation
  - attack.t1548.001
