title: Netcat/Socat Backdoor Listener
id: 1a2b3c4d-0015-4000-8000-000000000015
status: stable
description: Detects netcat or socat used to create persistent backdoor listeners
author: Thor Security
date: 2025/01/01
tags: [attack.command_and_control, attack.t1059.004]
logsource:
  category: process_creation
  product: linux
detection:
  selection_nc:
    Image|endswith: ['/nc', '/ncat', '/netcat']
    CommandLine|contains: ['-l', '-lvp', '-lvnp', '-e /bin/bash', '-e /bin/sh']
  selection_socat:
    Image|endswith: '/socat'
    CommandLine|contains:
      - 'EXEC'
      - 'SYSTEM'
      - 'pty'
  condition: selection_nc or selection_socat
level: high
falsepositives: [Network testing by admins]
