title: Container Escape - OverlayFS Container Escape
id: ce64ca29-68f7-4dca-b10a-7d46d0bbaf2d
status: stable
description: Detects OverlayFS Container Escape container escape technique
author: Thor Security Team
date: 2024/06/15
modified: 2025/03/01
tags:
    - attack.privilege_escalation
    - attack.lateral_movement
    - attack.t1611
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - '/proc/*/root'
            - 'upperdir'
    condition: selection
falsepositives:
    - Container administrators with legitimate privileged access
    - Security testing environments
level: critical
