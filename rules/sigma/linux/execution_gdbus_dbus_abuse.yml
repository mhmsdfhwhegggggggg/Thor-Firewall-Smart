title: DBus/Polkit Privilege Escalation
id: a1b2c3d4-0024-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects potential Polkit/DBus based privilege escalation (PwnKit CVE-2021-4034 and similar)
level: critical
author: Thor Security Team
date: 2024-01-01
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    Image|endswith:
      - '/pkexec'
    CommandLine|contains:
      - '/bin/bash'
      - '/bin/sh'
      - 'GCONV_PATH'
      - 'CHARSET'
  condition: selection
tags:
  - attack.privilege_escalation
  - attack.t1068
  - cve.2021-4034
