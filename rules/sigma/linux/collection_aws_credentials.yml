title: Cloud Credentials Access
id: a1b2c3d4-0022-4e5f-a6b7-c8d9e0f1a2b3
status: stable
description: Detects access to cloud provider credential files
level: critical
author: Thor Security Team
date: 2024-01-01
logsource:
  category: file_access
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '.aws/credentials'
      - '.aws/config'
      - '.azure/credentials'
      - '.gcloud/'
      - '.kube/config'
      - 'service_account.json'
      - 'application_default_credentials.json'
  condition: selection
tags:
  - attack.credential_access
  - attack.t1552.001
  - attack.collection
