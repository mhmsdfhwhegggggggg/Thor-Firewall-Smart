title: Kubernetes Configuration File Accessed
id: 1a2b3c4d-0043-4000-8000-000000000043
status: stable
description: Detects access to kubeconfig files for Kubernetes credential theft
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1552.001]
logsource:
  category: file_access
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '/.kube/config'
      - '/etc/kubernetes/admin.conf'
      - '/etc/kubernetes/kubelet.conf'
      - '/var/lib/kubelet/config.yaml'
      - 'kubeconfig'
  condition: selection
level: high
falsepositives: [kubectl, Kubernetes management tools]
