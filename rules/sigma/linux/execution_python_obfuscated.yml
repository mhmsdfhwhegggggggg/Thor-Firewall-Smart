title: Obfuscated Python Execution
id: 1a2b3c4d-0032-4000-8000-000000000032
status: stable
description: Detects obfuscated Python payloads using exec/eval/compile with base64/zlib
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1027, attack.execution, attack.t1059.006]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'exec(base64'
      - 'exec(compile'
      - 'eval(base64'
      - '__import__("base64")'
      - 'zlib.decompress'
      - 'marshal.loads'
      - 'exec(__import__'
  condition: selection
level: high
falsepositives: [Some Python obfuscation tools used legitimately]
