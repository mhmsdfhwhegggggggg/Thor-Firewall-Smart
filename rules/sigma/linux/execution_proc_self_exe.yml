title: Process Execution via /proc/self/exe Re-Execution
id: 1a2b3c4d-0022-4000-8000-000000000022
status: experimental
description: Detects malware re-launching itself via /proc/self/exe to evade detection
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1036.005]
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - '/proc/self/exe'
      - '/proc/self/fd/0'
      - 'memfd_create'
      - 'MFD_CLOEXEC'
  condition: selection
level: high
falsepositives: [Some JVM implementations, application packagers]
