title: Linux Security Hardening Violation 6
id: 06ed3fa5-62dd-4c18-a413-7bfff6b789cb
status: stable
description: Detects violation of Linux security hardening baseline control 6 - CIS Benchmark Level 2 compliance check
author: Thor Security Team
date: 2025/05/01
modified: 2025/06/15
tags:
    - attack.defense_evasion
    - attack.t1562
logsource:
    category: process_creation
    product: linux
detection:
    selection_disable_fw:
        CommandLine|contains:
            - 'iptables -F'
            - 'ufw disable'
            - 'systemctl stop firewalld'
    selection_disable_audit:
        CommandLine|contains:
            - 'service auditd stop'
            - 'systemctl disable auditd'
    condition: 1 of selection_*
falsepositives:
    - Authorized system maintenance
level: medium
