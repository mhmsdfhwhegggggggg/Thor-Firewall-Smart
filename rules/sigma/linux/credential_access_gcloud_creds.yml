title: GCP/Azure/AWS CLI Credential File Access
id: 1a2b3c4d-0031-4000-8000-000000000031
status: stable
description: Detects access to cloud provider CLI credential files
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1552.001]
logsource:
  category: file_access
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '.config/gcloud/credentials.db'
      - '.config/gcloud/access_tokens.db'
      - '.azure/accessTokens.json'
      - '.azure/azureProfile.json'
      - '.aws/credentials'
      - '.aws/config'
      - '.kube/config'
      - '.docker/config.json'
  condition: selection
level: high
falsepositives: [Cloud CLI tools accessing own credentials]
