title: Linux Privilege Escalation - SUID Binary Discovery for Privesc
id: 8ac65122-764e-4400-a5a5-7da37b9acfd1
status: stable
description: Detects SUID Binary Discovery for Privesc privilege escalation technique
author: Thor Security Team
date: 2024/09/15
modified: 2025/04/01
tags:
    - attack.privilege_escalation
    - attack.t1548.001
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - 'find.*-perm -4000'
            - 'find.*-perm -u=s'
    condition: selection
falsepositives:
    - System administrators performing legitimate maintenance
level: high
