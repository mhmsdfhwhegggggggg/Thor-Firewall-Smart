title: Library Hijacking via ldconfig or ld.so.conf
id: 1a2b3c4d-0018-4000-8000-000000000018
status: stable
description: Detects modification of ld.so.conf or ldconfig for library hijacking persistence
author: Thor Security
date: 2025/01/01
tags: [attack.persistence, attack.t1574.006]
logsource:
  category: file_event
  product: linux
detection:
  selection:
    TargetFilename|contains:
      - '/etc/ld.so.conf'
      - '/etc/ld.so.conf.d/'
      - '/etc/ld.so.preload'
  condition: selection
level: high
falsepositives: [Legitimate library configuration]
