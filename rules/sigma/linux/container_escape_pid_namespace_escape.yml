title: Container Escape - PID Namespace Escape
id: ff5caa7e-5dd2-4205-87ae-05803b7f8989
status: stable
description: Detects PID Namespace Escape container escape technique
author: Thor Security Team
date: 2024/06/15
modified: 2025/03/01
tags:
    - attack.privilege_escalation
    - attack.lateral_movement
    - attack.t1611
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        CommandLine|contains:
            - 'nsenter -t 1 -m -u -i -n'
            - '--target 1'
    condition: selection
falsepositives:
    - Container administrators with legitimate privileged access
    - Security testing environments
level: critical
