status: stable
description: Detects Polkit CVE Exploitation privilege escalation technique
author: Thor Security Team
date: 2024/09/15
modified: 2025/04/01
tags:
    - attack.privilege_escalation
    - attack.t1068
logsource:
    category: process_creation
