title: macOS Keychain Credential Access
id: 5a2b3c4d-0007-4000-8000-000000000007
status: stable
description: Detects unauthorized access to macOS Keychain for credential theft
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1555.001]
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    CommandLine|contains:
      - 'security find-generic-password'
      - 'security find-internet-password'
      - 'security dump-keychain'
      - 'security unlock-keychain'
      - 'chainbreaker'
      - 'keychaindump'
  condition: selection
level: high
falsepositives: [Password managers, development tools]
