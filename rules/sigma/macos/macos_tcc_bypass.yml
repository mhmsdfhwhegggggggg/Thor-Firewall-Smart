title: macOS TCC Database Modification
id: 5a2b3c4d-0003-4000-8000-000000000003
status: experimental
description: Detects modification of TCC.db (Transparency, Consent, Control) for bypass
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1548.006]
logsource:
  category: file_event
  product: macos
detection:
  selection:
    TargetFilename|contains:
      - '/Library/Application Support/com.apple.TCC/TCC.db'
      - '/Users/*/Library/Application Support/com.apple.TCC/TCC.db'
  condition: selection
level: critical
falsepositives: [Authorized privacy settings changes]
