title: macOS Screensaver Path Modified for Persistence
id: 5a2b3c4d-0015-4000-8000-000000000015
status: experimental
description: Detects modification of screensaver path for persistence (SCREENSAVERDEFAULTS)
author: Thor Security
date: 2025/01/01
tags: [attack.persistence, attack.t1546.002]
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    CommandLine|contains:
      - 'com.apple.screensaver'
      - 'SCREENSAVERDEFAULTS'
      - 'defaults write com.apple.screensaver'
  condition: selection
level: medium
falsepositives: [Screensaver configuration tools]
