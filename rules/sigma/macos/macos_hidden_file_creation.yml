title: Hidden File or Directory Created (macOS)
id: 5a2b3c4d-0012-4000-8000-000000000012
status: experimental
description: Detects creation of hidden files/directories for defense evasion on macOS
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1564.001]
logsource:
  category: file_event
  product: macos
detection:
  selection:
    TargetFilename|contains:
      - '/.'
    TargetFilename|contains:
      - '/tmp/.'
      - '/Library/.'
      - '/Users/.'
    TargetFilename|endswith:
      - '.sh'
      - '.py'
      - '.rb'
  condition: selection
level: medium
falsepositives: [Application config files, dotfiles]
