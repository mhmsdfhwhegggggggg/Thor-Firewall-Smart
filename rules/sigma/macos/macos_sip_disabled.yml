title: macOS System Integrity Protection (SIP) Disabled
id: 5a2b3c4d-0011-4000-8000-000000000011
status: stable
description: Detects SIP disable attempt — requires reboot but may be staged
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1562.006]
