title: macOS /etc/hosts File Modified
id: 5a2b3c4d-0009-4000-8000-000000000009
status: stable
description: Detects modification of /etc/hosts on macOS for DNS spoofing
author: Thor Security
date: 2025/01/01
tags: [attack.defense_evasion, attack.t1566.001]
logsource:
  category: file_event
  product: macos
detection:
  selection:
    TargetFilename: '/private/etc/hosts'
  filter_legit:
    Image|contains: ['/usr/bin/', 'Virtualbox', 'docker', 'ansible', 'homebrew']
  condition: selection and not filter_legit
level: high
falsepositives: [Software installers, dev environments]
