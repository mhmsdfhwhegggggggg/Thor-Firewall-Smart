title: macOS Kernel Extension (KEXT) Loaded
id: 5a2b3c4d-0006-4000-8000-000000000006
status: stable
description: Detects loading of kernel extensions — possible rootkit installation
author: Thor Security
date: 2025/01/01
tags: [attack.persistence, attack.t1547.006]
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: ['/kextload', '/kextutil']
    CommandLine|contains:
      - '.kext'
  filter_apple:
    CommandLine|contains: ['/System/Library/Extensions/', 'com.apple.', 'AppleKext']
  condition: selection and not filter_apple
level: high
falsepositives: [Third-party device drivers]
