title: ICS DNP3 Protocol Anomaly Detection [v32]
id: thor-2026-ics-cloud-0253
status: experimental
description: >
  Detects potential DNP3 replay or injection attacks on SCADA systems. Variant 32 of this detection covering
  slight behavioral differences in modern ics cloud threat actors.
references:
  - https://attack.mitre.org/techniques/T0836/
  - https://thor-security.io/rules/2026/ics_cloud
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.impair_process_control
  - attack.t0836
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'pymodbus'
      - 'dnp3-python'
      - 'opendnp3'
      - 'scapy DNP3'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: critical
