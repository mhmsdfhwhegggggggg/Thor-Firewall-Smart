title: AWS CloudTrail Logging Disabled [v5]
id: thor-2026-ics-cloud-0034
status: experimental
description: >
  Detects disabling of AWS CloudTrail logging to cover attack tracks. Variant 5 of this detection covering
  slight behavioral differences in modern ics cloud threat actors.
references:
  - https://attack.mitre.org/techniques/T1562/
  - https://thor-security.io/rules/2026/ics_cloud
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.defense_evasion
  - attack.t1562
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'aws cloudtrail stop-logging'
      - 'DeleteTrail'
      - 'UpdateTrail.*IsLogging.*false'
      - 'StopLogging'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: critical
