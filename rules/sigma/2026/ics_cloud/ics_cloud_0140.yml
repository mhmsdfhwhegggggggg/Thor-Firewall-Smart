title: Azure Automation Runbook Abuse [v18]
id: thor-2026-ics-cloud-0140
status: experimental
description: >
  Detects abuse of Azure Automation runbooks for arbitrary code execution. Variant 18 of this detection covering
  slight behavioral differences in modern ics cloud threat actors.
references:
  - https://attack.mitre.org/techniques/T1648/
  - https://thor-security.io/rules/2026/ics_cloud
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.execution
  - attack.t1648
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'New-AzAutomationRunbook'
      - 'Start-AzAutomationRunbook'
      - 'Invoke-AzAutomationRunbook'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: high
