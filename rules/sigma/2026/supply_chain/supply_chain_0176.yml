title: Kubernetes Admission Webhook Bypass [v22]
id: thor-2026-supply-chain-0176
status: experimental
description: >
  Detects direct API server calls bypassing admission webhooks. Variant 22 of this detection covering
  slight behavioral differences in modern supply chain threat actors.
references:
  - https://attack.mitre.org/techniques/T1610/
  - https://thor-security.io/rules/2026/supply_chain
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.defense_evasion
  - attack.t1610
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'kubectl apply --dry-run=none --validate=false'
      - 'curl https://kubernetes.default'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: high
