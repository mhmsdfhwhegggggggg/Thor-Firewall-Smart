title: Ransomware Lateral Propagation via SMB [v20]
id: thor-2026-ransomware-0158
status: experimental
description: >
  Detects ransomware spreading to network shares. Variant 20 of this detection covering
  slight behavioral differences in modern ransomware threat actors.
references:
  - https://attack.mitre.org/techniques/T1021/
  - https://thor-security.io/rules/2026/ransomware
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.lateral_movement
  - attack.t1021
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'net use \\'
      - 'smbclient -c put'
      - 'mount -t cifs'
      - 'Invoke-SMBExec'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: critical
