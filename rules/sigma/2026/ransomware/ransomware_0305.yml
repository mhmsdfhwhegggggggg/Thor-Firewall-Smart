title: Double Extortion Data Staging Before Encryption [v39]
id: thor-2026-ransomware-0305
status: experimental
description: >
  Detects data collection followed by encryption pattern indicating double extortion. Variant 39 of this detection covering
  slight behavioral differences in modern ransomware threat actors.
references:
  - https://attack.mitre.org/techniques/T1486/
  - https://thor-security.io/rules/2026/ransomware
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.impact
  - attack.t1486
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - '7z a'
      - 'rar a'
      - 'tar czf'
      - 'zip -r'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: critical
