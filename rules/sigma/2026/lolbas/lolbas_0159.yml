title: WMIC Remote Process Creation for Lateral Movement [v20]
id: thor-2026-lolbas-0159
status: experimental
description: >
  Detects WMIC used to create processes on remote systems. Variant 20 of this detection covering
  slight behavioral differences in modern lolbas threat actors.
references:
  - https://attack.mitre.org/techniques/T1047/
  - https://thor-security.io/rules/2026/lolbas
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.execution
  - attack.t1047
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'wmic /node: process call create'
      - 'wmic.exe /node: process'
      - 'wmic process where name call terminate'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: high
