title: DD Device Wipe Indicating Destruction [v27]
id: thor-2026-lolbas-0214
status: experimental
description: >
  Detects dd command writing zeros to disk devices indicating data destruction. Variant 27 of this detection covering
  slight behavioral differences in modern lolbas threat actors.
references:
  - https://attack.mitre.org/techniques/T1561/
  - https://thor-security.io/rules/2026/lolbas
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.impact
  - attack.t1561
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'dd if=/dev/zero of=/dev/sd'
      - 'dd if=/dev/urandom of=/dev/nvme'
      - 'dd if=/dev/null of=/dev/vd'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: critical
