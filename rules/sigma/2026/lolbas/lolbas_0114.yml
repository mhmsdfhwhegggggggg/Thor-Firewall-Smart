title: Regsvr32 AppLocker Bypass via Remote Script [v15]
id: thor-2026-lolbas-0114
status: experimental
description: >
  Detects regsvr32 used to bypass application control policies. Variant 15 of this detection covering
  slight behavioral differences in modern lolbas threat actors.
references:
  - https://attack.mitre.org/techniques/T1218/
  - https://thor-security.io/rules/2026/lolbas
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.defense_evasion
  - attack.t1218
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'regsvr32 /s /n /u /i:http'
      - 'regsvr32.exe /s /n /u /i:ftp'
      - 'regsvr32 scrobj.dll'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: high
