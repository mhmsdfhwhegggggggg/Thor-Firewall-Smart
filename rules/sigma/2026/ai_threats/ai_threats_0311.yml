title: LLM Safety Guardrail Bypass Attempt [v39]
id: thor-2026-ai-threats-0311
status: experimental
description: >
  Detects known jailbreak patterns targeting LLM safety filters. Variant 39 of this detection covering
  slight behavioral differences in modern ai threats threat actors.
references:
  - https://attack.mitre.org/techniques/T1562/
  - https://thor-security.io/rules/2026/ai_threats
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.defense_evasion
  - attack.t1562
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'ignore previous instructions'
      - 'DAN mode'
      - 'developer mode override'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: medium
