title: Autonomous AI Agent Spawning Unexpected Process [v31]
id: thor-2026-ai-threats-0243
status: experimental
description: >
  Detects AI agent frameworks spawning unexpected system commands. Variant 31 of this detection covering
  slight behavioral differences in modern ai threats threat actors.
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://thor-security.io/rules/2026/ai_threats
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.execution
  - attack.t1059
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'langchain'
      - 'autogpt'
      - 'crewai'
      - 'agentgpt'
      - 'smolagents'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: high
