title: ML Model Poisoning via File Replacement [v9]
id: thor-2026-ai-threats-0068
status: experimental
description: >
  Detects unauthorized replacement of model weight files. Variant 9 of this detection covering
  slight behavioral differences in modern ai threats threat actors.
references:
  - https://attack.mitre.org/techniques/T1565/
  - https://thor-security.io/rules/2026/ai_threats
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.impact
  - attack.t1565
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'mv --force'
      - 'cp --no-preserve'
      - 'dd of='
      - 'truncate -s'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: critical
