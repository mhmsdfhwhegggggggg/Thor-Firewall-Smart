title: Vector Database Bulk Exfiltration [v34]
id: thor-2026-ai-threats-0269
status: experimental
description: >
  Detects bulk extraction from vector databases. Variant 34 of this detection covering
  slight behavioral differences in modern ai threats threat actors.
references:
  - https://attack.mitre.org/techniques/T1530/
  - https://thor-security.io/rules/2026/ai_threats
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.collection
  - attack.t1530
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'chroma'
      - 'weaviate'
      - 'qdrant'
      - 'milvus'
      - 'pinecone'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: high
