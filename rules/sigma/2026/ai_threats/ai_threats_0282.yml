title: AI Model Weight Exfiltration [v36]
id: thor-2026-ai-threats-0282
status: experimental
description: >
  Detects bulk transfer of model files to external hosts. Variant 36 of this detection covering
  slight behavioral differences in modern ai threats threat actors.
references:
  - https://attack.mitre.org/techniques/T1041/
  - https://thor-security.io/rules/2026/ai_threats
author: Thor Security Team
date: 2026/01/01
modified: 2026/06/16
tags:
  - attack.exfiltration
  - attack.t1041
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'rsync'
      - 'scp'
      - 'rclone'
      - 'aws s3 cp'
  filter_admin_tools:
    ParentImage|contains:
      - '/usr/bin/apt'
      - '/usr/bin/snap'
      - '/usr/local/bin/ansible'
      - '/usr/bin/chef-client'
  filter_known_paths:
    CurrentDirectory|startswith:
      - '/opt/security-tools/'
      - '/home/pentest/'
  condition: selection and not 1 of filter_*
fields:
  - CommandLine
  - ParentCommandLine
  - User
  - ProcessId
  - ProcessName
  - HostName
  - CurrentDirectory
falsepositives:
  - Legitimate administrative operations matching these patterns
  - Authorized security testing and red team operations
  - Approved CI/CD pipeline automated tasks
  - Security research environments
level: critical
