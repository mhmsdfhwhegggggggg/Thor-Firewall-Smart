title: Kubernetes ClusterRoleBinding with cluster-admin
id: 3a2b3c4d-0017-4000-8000-000000000017
status: stable
description: Detects creation of ClusterRoleBindings granting cluster-admin
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1548/
tags:
  - attack.privilege_escalation
  - attack.t1548
logsource:
  product: kubernetes
  service: audit
detection:
  selection:
    verb: 'create'
    objectRef.resource: 'clusterrolebindings'
    requestObject.roleRef.name: 'cluster-admin'
  condition: selection
level: critical
falsepositives:
  - Authorized cluster administration
