title: Cloud Generic Threat Pattern 17
id: 84ed0368-b0d7-4287-8ea1-7890b8392a0e
status: stable
description: Detects cloud environment threat pattern 17 involving unauthorized access or configuration changes
author: Thor Security Team
date: 2025/04/01
modified: 2025/06/15
tags:
    - attack.cloud
    - attack.t1078.004
logsource:
