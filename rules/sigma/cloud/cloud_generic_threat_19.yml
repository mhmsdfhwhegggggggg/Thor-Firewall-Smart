title: Cloud Generic Threat Pattern 19
id: e166d0cc-6b0a-4e81-b6be-e7c2c79a249f
status: stable
description: Detects cloud environment threat pattern 19 involving unauthorized access or configuration changes
author: Thor Security Team
date: 2025/04/01
modified: 2025/06/15
tags:
    - attack.cloud
    - attack.t1078.004
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        errorCode: 'AccessDenied'
        userAgent|contains: 'python-requests'
    condition: selection
falsepositives:
    - Misconfigured applications
level: medium
