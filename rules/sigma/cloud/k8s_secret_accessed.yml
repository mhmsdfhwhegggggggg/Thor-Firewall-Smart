title: Kubernetes Secret Accessed
id: 3a2b3c4d-0020-4000-8000-000000000020
status: experimental
description: Detects access to Kubernetes secrets — may indicate credential theft
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1552/007/
tags:
  - attack.credential_access
  - attack.t1552.007
logsource:
  product: kubernetes
  service: audit
detection:
  selection:
    objectRef.resource: 'secrets'
    verb|contains:
      - 'get'
      - 'list'
      - 'watch'
  filter_controllers:
    user.username|contains:
      - 'system:serviceaccount:kube-system'
      - 'system:controller'
  condition: selection and not filter_controllers
level: medium
falsepositives:
  - Application pods reading their own secrets
