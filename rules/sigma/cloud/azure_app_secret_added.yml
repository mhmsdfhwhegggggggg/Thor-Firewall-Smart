title: Azure Application Secret or Certificate Added
id: 3a2b3c4d-0011-4000-8000-000000000011
status: stable
description: Detects addition of secrets/certificates to Azure AD app registrations
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1098/001/
tags:
  - attack.persistence
  - attack.t1098.001
logsource:
  product: azure
  service: auditlogs
detection:
  selection:
    operationName|contains:
      - 'Add service principal credentials'
      - 'Update application'
      - 'Add password to application'
      - 'Add key to application'
  condition: selection
level: medium
falsepositives:
  - Authorized application lifecycle management
