title: Cloud Generic Threat Pattern 9
id: db482a17-033f-4f86-b543-18aa3a385e5e
status: stable
description: Detects cloud environment threat pattern 9 involving unauthorized access or configuration changes
author: Thor Security Team
date: 2025/04/01
modified: 2025/06/15
tags:
    - attack.cloud
    - attack.t1078.004
logsource:
