title: Cloud Generic Threat Pattern 15
id: 92d8cd9a-81fa-43c7-90dd-e5abfe01c29c
status: stable
description: Detects cloud environment threat pattern 15 involving unauthorized access or configuration changes
author: Thor Security Team
date: 2025/04/01
modified: 2025/06/15
tags:
    - attack.cloud
    - attack.t1078.004
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        errorCode: 'AccessDenied'
        userAgent|contains: 'python-requests'
    condition: selection
falsepositives:
    - Misconfigured applications
level: medium
