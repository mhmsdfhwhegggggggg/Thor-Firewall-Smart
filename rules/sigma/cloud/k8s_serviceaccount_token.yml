title: Kubernetes Security - K8s Service Account Token Theft
id: 18206595-3a0e-4c1a-a3c7-e4b6f0fd96c4
status: stable
description: Detects K8s Service Account Token Theft in Kubernetes audit logs
author: Thor Security Team
date: 2024/12/01
modified: 2025/06/15
tags:
    - attack.cloud
    - attack.containers
    - attack.t1528
logsource:
    product: kubernetes
    service: audit
detection:
    selection:
        objectRef.resource: 'pods'
        verb: 'create'
    condition: selection
falsepositives:
    - Authorized Kubernetes administrators
level: high
