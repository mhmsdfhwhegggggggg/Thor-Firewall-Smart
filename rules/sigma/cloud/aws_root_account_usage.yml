title: AWS Root Account Usage
id: 3a2b3c4d-0001-4000-8000-000000000001
status: stable
description: Detects usage of AWS root account — should never be used in production
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1078/004/
tags:
  - attack.privilege_escalation
  - attack.t1078.004
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    userIdentity.type: Root
    errorCode|not: '*'
  condition: selection
level: critical
falsepositives:
  - Emergency root access (should be extremely rare)
