title: GCP Service Account Key Created
id: 3a2b3c4d-0014-4000-8000-000000000014
status: stable
description: Detects creation of GCP service account keys for unauthorized access
author: Thor Security
date: 2025/01/01
references:
  - https://attack.mitre.org/techniques/T1552/001/
tags:
  - attack.credential_access
  - attack.t1552.001
logsource:
  product: gcp
  service: gcp.audit
detection:
  selection:
    protoPayload.methodName|contains:
      - 'iam.serviceAccounts.keys.create'
      - 'google.iam.admin.v1.CreateServiceAccountKey'
  condition: selection
level: medium
falsepositives:
  - Authorized service account management
