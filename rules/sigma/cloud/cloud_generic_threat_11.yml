title: Cloud Generic Threat Pattern 11
id: b2e34419-6442-487b-b042-9ab32aad595b
status: stable
description: Detects cloud environment threat pattern 11 involving unauthorized access or configuration changes
author: Thor Security Team
date: 2025/04/01
modified: 2025/06/15
tags:
    - attack.cloud
    - attack.t1078.004
logsource:
