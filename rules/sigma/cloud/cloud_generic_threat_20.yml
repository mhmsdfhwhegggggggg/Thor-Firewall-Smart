title: Cloud Generic Threat Pattern 20
id: 7f48fe1f-cfd1-4c65-9cac-b0ae9ef43f35
status: stable
description: Detects cloud environment threat pattern 20 involving unauthorized access or configuration changes
author: Thor Security Team
date: 2025/04/01
modified: 2025/06/15
tags:
    - attack.cloud
    - attack.t1078.004
logsource:
