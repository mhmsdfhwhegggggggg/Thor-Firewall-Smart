title: Azure Key Vault Secrets Bulk Access
id: 3a2b3c4d-0022-4000-8000-000000000022
status: stable
description: Detects bulk access to Azure Key Vault secrets suggesting credential harvesting
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1552.001]
logsource:
  product: azure
  service: keyvaultlogs
detection:
  selection:
    OperationName: 'SecretGet'
    ResultType: 'Success'
  condition: selection | count() by CallerIPAddress > 20
level: high
falsepositives: [Authorized secret rotation scripts]
