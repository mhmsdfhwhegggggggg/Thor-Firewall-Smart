title: RDP Brute Force from External IP
id: 4a2b3c4d-0010-4000-8000-000000000010
status: stable
description: Detects RDP brute force attempts from external (non-RFC1918) addresses
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1110.001]
logsource:
  category: network_connection
  product: linux
detection:
  selection:
    dst_port: 3389
    src_ip|not|contains:
      - '10.'
      - '192.168.'
      - '172.16.'
      - '172.17.'
      - '172.31.'
      - '127.0.0.1'
  condition: selection
level: high
falsepositives: [Authorized remote administration]
