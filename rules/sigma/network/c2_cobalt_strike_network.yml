title: Cobalt Strike C2 Network Indicators
id: 4a2b3c4d-0014-4000-8000-000000000014
status: stable
description: Detects Cobalt Strike C2 beacon network patterns (HTTP malleable profiles)
author: Thor Security
date: 2025/01/01
tags: [attack.command_and_control, attack.t1071.001]
logsource:
  category: proxy
  product: zeek
detection:
  selection_ua:
    http.user_agent|contains:
      - 'Mozilla/4.0 (compatible; MSIE 8.0'
      - 'Mozilla/5.0 (Windows NT 6.1; WOW64'
  selection_uri:
    http.uri|contains:
      - '/s/ref='
      - '/dp/'
      - 'dpuf='
      - '__utm.gif'
      - 'jquery-3.3.1.slim.min.js'
  selection_headers:
    http.headers|contains:
      - 'X-Request-ID'
      - 'Accept-Encoding: gzip, deflate'
  condition: selection_ua or (selection_uri and selection_headers)
level: high
falsepositives: [Amazon shopping, jQuery CDN, legitimate analytics]
