title: PowerShell Empire/Metasploit Stager Network Pattern
id: 4a2b3c4d-0021-4000-8000-000000000021
status: stable
description: Detects HTTP GET requests matching Empire/Metasploit stager patterns
author: Thor Security
date: 2025/01/01
tags: [attack.command_and_control, attack.t1071.001]
logsource:
  category: proxy
  product: zeek
detection:
  selection:
    http.uri|re: '^/[A-Za-z0-9+/]{4,}={0,2}$'
    http.method: GET
    http.uri|not|contains:
      - '.js'
      - '.css'
      - '.png'
      - '.jpg'
      - '.html'
  condition: selection
level: medium
falsepositives: [Some REST APIs with base64-encoded path segments]
