title: Large Outbound Data Transfer (Potential Exfiltration)
id: 4a2b3c4d-0016-4000-8000-000000000016
status: experimental
description: Detects unusually large outbound transfers to external hosts
author: Thor Security
date: 2025/01/01
tags: [attack.exfiltration, attack.t1041]
logsource:
  category: network_connection
  product: zeek
detection:
  selection:
    bytes_sent|gt: 104857600
    dst_ip|not|contains:
      - '10.'
      - '192.168.'
      - '172.16.'
  condition: selection
level: high
falsepositives: [Legitimate backups, software updates, video streaming]
