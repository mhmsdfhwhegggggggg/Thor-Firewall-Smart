title: SSH Brute Force from External Network
id: 4a2b3c4d-0019-4000-8000-000000000019
status: stable
description: Detects multiple failed SSH authentication attempts from external IPs
author: Thor Security
date: 2025/01/01
tags: [attack.credential_access, attack.t1110.001]
logsource:
  category: authentication
  product: linux
detection:
  selection:
    event.dataset: 'auth'
    process.name: 'sshd'
    event.outcome: 'failure'
    source.ip|not|contains:
      - '10.'
      - '192.168.'
      - '172.16.'
  condition: selection | count() by source.ip > 10
level: high
falsepositives: [Authorized admins with typos]
