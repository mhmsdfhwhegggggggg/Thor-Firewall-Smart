title: HTTP C2 Beaconing Pattern
id: 4a2b3c4d-0007-4000-8000-000000000007
status: experimental
description: Detects periodic HTTP requests consistent with C2 beaconing behavior
author: Thor Security
date: 2025/01/01
tags: [attack.command_and_control, attack.t1071.001, attack.t1008]
logsource:
  category: proxy
  product: zeek
detection:
  selection:
    http.user_agent|contains:
      - 'Mozilla/5.0 (compatible; '
      - 'curl/'
      - 'python-requests'
      - 'Go-http-client'
      - 'Wget/'
    http.method: 'GET'
    http.uri|contains:
      - '/beacon'
      - '/heartbeat'
      - '/ping'
      - '/check'
      - '/tasks'
  condition: selection
level: medium
falsepositives: [Health check endpoints, monitoring agents]
