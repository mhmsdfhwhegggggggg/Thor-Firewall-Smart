title: Advanced Network Threat Pattern 14
id: 09ad9217-5ca4-4e6d-a32e-10dc2f55c2ec
status: stable
description: Detects advanced network threat pattern 14 based on behavioral analytics and threat intelligence feeds
author: Thor Security Team
date: 2025/04/01
modified: 2025/06/15
tags:
    - attack.command_and_control
    - attack.t1071
logsource:
    category: network_connection
    product: linux
detection:
    selection_beacon:
        Initiated: 'true'
        DestinationPort:
            - 443
            - 8443
            - 4433
    filter_known_good:
        DestinationHostname|endswith:
            - '.google.com'
            - '.microsoft.com'
            - '.cloudflare.com'
    condition: selection_beacon and not filter_known_good
falsepositives:
    - Legitimate HTTPS connections
level: low
