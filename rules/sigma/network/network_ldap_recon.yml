title: LDAP Enumeration / Active Directory Recon
id: 4a2b3c4d-0008-4000-8000-000000000008
status: stable
description: Detects LDAP queries for AD enumeration from non-DC/admin hosts
author: Thor Security
date: 2025/01/01
tags: [attack.discovery, attack.t1087.002]
logsource:
  category: network_connection
  product: windows
detection:
  selection:
    DestinationPort: [389, 636, 3268, 3269]
    Initiated: 'true'
  filter_legit:
    Image|contains:
      - '\lsass.exe'
      - '\svchost.exe'
      - '\explorer.exe'
      - '\outlook.exe'
  condition: selection and not filter_legit
level: medium
falsepositives: [AD management tools, domain controllers]
