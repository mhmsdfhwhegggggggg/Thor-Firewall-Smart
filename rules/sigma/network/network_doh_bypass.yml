title: DNS over HTTPS (DoH) Bypass of DNS Monitoring
id: 4a2b3c4d-0017-4000-8000-000000000017
status: experimental
description: Detects use of DNS-over-HTTPS to bypass DNS monitoring/filtering
author: Thor Security
date: 2025/01/01
tags: [attack.command_and_control, attack.t1071.004]
logsource:
  category: proxy
  product: zeek
detection:
  selection:
    http.host|contains:
      - 'dns.google'
      - '8.8.8.8'
      - 'cloudflare-dns.com'
      - 'one.one.one.one'
      - '1.1.1.1'
      - 'doh.opendns.com'
      - 'dns.quad9.net'
    http.uri|contains:
      - '/dns-query'
      - '/resolve'
  condition: selection
level: low
falsepositives: [Applications using DoH for privacy]
