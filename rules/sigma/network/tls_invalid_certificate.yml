title: TLS Connection with Self-Signed or Invalid Certificate
id: 4a2b3c4d-0018-4000-8000-000000000018
status: experimental
description: Detects TLS connections to hosts using self-signed certificates — C2 infrastructure
author: Thor Security
date: 2025/01/01
tags: [attack.command_and_control, attack.t1071.001]
logsource:
  category: network
  product: zeek
detection:
  selection:
    ssl.validation_status|contains:
      - 'self signed'
      - 'unable to get local issuer certificate'
      - 'certificate has expired'
    ssl.established: 'true'
    dst_ip|not|contains:
      - '10.'
      - '192.168.'
      - '172.'
  condition: selection
level: medium
falsepositives: [Development environments, internal services]
