title: Advanced Network Threat Pattern 13
id: 4a9567ae-151c-497c-95fa-82743b5465a2
status: stable
description: Detects advanced network threat pattern 13 based on behavioral analytics and threat intelligence feeds
author: Thor Security Team
date: 2025/04/01
modified: 2025/06/15
tags:
    - attack.command_and_control
    - attack.t1071
logsource:
    category: network_connection
    product: linux
detection:
    selection_beacon:
        Initiated: 'true'
        DestinationPort:
            - 443
            - 8443
            - 4433
    filter_known_good:
        DestinationHostname|endswith:
            - '.google.com'
            - '.microsoft.com'
            - '.cloudflare.com'
    condition: selection_beacon and not filter_known_good
falsepositives:
    - Legitimate HTTPS connections
level: low
