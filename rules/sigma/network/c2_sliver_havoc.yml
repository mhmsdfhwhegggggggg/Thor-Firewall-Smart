title: Sliver or Havoc C2 Framework Network Indicators
id: 4a2b3c4d-0015-4000-8000-000000000015
status: stable
description: Detects network patterns from Sliver or Havoc C2 frameworks
author: Thor Security
date: 2025/01/01
tags: [attack.command_and_control, attack.t1071.001]
logsource:
  category: proxy
  product: zeek
detection:
  selection:
    http.user_agent|contains:
      - 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/'
    http.uri|contains:
      - '/v1/id/'
      - '/rpc/'
      - '/socket.io/'
    http.method: 'POST'
  selection_port:
    dst_port: [8888, 8443, 4433, 31337, 9090]
  condition: selection or selection_port
level: medium
falsepositives: [Web application APIs]
