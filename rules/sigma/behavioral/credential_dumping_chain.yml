title: Credential Dumping Attack Chain Multi-Stage Sequence
id: thor-behavioral-seq-002
status: stable
description: |
  Detects credential dumping attack sequences across multiple events:
  1. Privilege escalation (SeDebugPrivilege or sudo acquisition)
  2. LSASS/SAM/credential store access attempt
  3. Memory dump file creation
  4. Exfiltration of the dump file to external host
  Temporal correlation window: 5 minutes between stages.
references:
  - https://attack.mitre.org/techniques/T1003/
  - https://attack.mitre.org/techniques/T1003/001/
author: Thor Security Team
date: 2026/01/01
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
  - attack.t1003.003
logsource:
  category: process_creation
  product: linux
detection:
  step1_priv_escalation:
    CommandLine|contains:
      - 'sudo su'
      - 'SeDebugPrivilege'
      - 'sudo -i'
      - 'pkexec bash'
      - 'setuid(0)'
  step2_credential_access:
    CommandLine|contains:
      - '/proc/'
      - 'sekurlsa'
      - 'lsadump'
      - '/etc/shadow'
      - '/etc/passwd'
      - 'procdump -ma lsass'
      - 'mimikatz'
  step3_dump_created:
    TargetFilename|contains:
      - '.dmp'
      - '.dump'
      - 'minidump'
      - 'lsass.dmp'
      - 'passwords.txt'
  step4_exfiltration:
    CommandLine|contains:
      - 'curl -F'
      - 'wget --post-file'
      - 'scp '
      - 'rsync '
      - 'nc -w'
  timewindow: 300s
  sequence:
    - step1_priv_escalation
    - step2_credential_access
    - step3_dump_created
    - step4_exfiltration
  condition: sequence
fields:
  - CommandLine
  - TargetFilename
  - User
  - DestinationIp
falsepositives:
  - Authorized penetration testing with written approval
  - Security incident response forensic data collection
  - Crash dump collectors on production servers
level: critical
