# ════════════════════════════════════════════════════════════════════════════════
# Thor Firewall Smart — Production Nginx TLS Termination
# Security rating target: SSL Labs A+ / Mozilla Modern
# Run with: nginx:1.25-alpine
# ════════════════════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    # ── Core settings ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    server_tokens      off;
    charset            utf-8;

    # ── Connection limits ──────────────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=perip:20m;
    limit_req_zone  $binary_remote_addr zone=api_limit:20m  rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=login_limit:10m rate=10r/m;

    # ── TLS session cache ──────────────────────────────────────────────────────
    ssl_session_cache    shared:SSL:50m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;

    # ── TLS: Modern configuration (Mozilla recommendation) ────────────────────
    ssl_protocols              TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_dhparam               /etc/nginx/dhparam4096.pem;

    # ── OCSP Stapling ─────────────────────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── HSTS preloaded ────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                               always;
    add_header X-Content-Type-Options     "nosniff"                            always;
    add_header X-XSS-Protection           "1; mode=block"                     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:; frame-ancestors 'none'" always;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":"$status",'
        '"bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher",'
        '"request_id":"$request_id"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Upstream: thor-agent (mTLS) ───────────────────────────────────────────
    upstream thor_api {
        least_conn;
        # In K8s: use service DNS; on bare-metal: list agent IPs
        server thor-agent:8443 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name thor.security.internal;

        # ── TLS certificates ─────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        ssl_trusted_certificate /etc/nginx/tls/ca-chain.crt;

        # ── mTLS: require client cert for admin routes ─────────────────────────
        # ssl_verify_client   optional_no_ca;
        # ssl_client_certificate /etc/nginx/tls/ca.crt;
        # ssl_verify_depth    3;

        # ── Proxy settings ────────────────────────────────────────────────────
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Request-ID      $request_id;
        proxy_set_header    Connection        "";
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
        proxy_buffering     off;

        # mTLS: present client cert to upstream thor-agent
        proxy_ssl_certificate     /etc/nginx/tls/nginx-client.crt;
        proxy_ssl_certificate_key /etc/nginx/tls/nginx-client.key;
        proxy_ssl_trusted_certificate /etc/nginx/tls/ca-chain.crt;
        proxy_ssl_verify      on;
        proxy_ssl_verify_depth 3;
        proxy_ssl_protocols   TLSv1.3;

        # ── Health check (no auth, no rate limit) ─────────────────────────────
        location = /health {
            limit_conn perip 20;
            proxy_pass https://thor_api;
        }

        # ── Login (strict rate limit) ─────────────────────────────────────────
        location = /api/v1/login {
            limit_req zone=login_limit burst=5 nodelay;
            limit_conn perip 5;
            client_max_body_size 16k;
            proxy_pass https://thor_api;
        }

        # ── Metrics (Prometheus — internal only) ──────────────────────────────
        location = /metrics {
            # Restrict to monitoring network
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass https://thor_api;
        }

        # ── WebSocket (real-time alert stream) ────────────────────────────────
        location /ws/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn perip 10;
            proxy_pass https://thor_api;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_read_timeout 3600s;   # WebSocket long-lived connection
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn perip 100;
            client_max_body_size 64k;
            proxy_pass https://thor_api;
        }

        # ── Dashboard (React SPA) ─────────────────────────────────────────────
        location / {
            root   /var/www/thor-dashboard;
            index  index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|ico|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 429 /429.json;
        error_page 500 502 503 504 /50x.json;

        location = /429.json {
            internal;
            return 429 '{"error":"rate_limited","message":"Too many requests"}';
            add_header Content-Type application/json;
        }

        location = /50x.json {
            internal;
            return 500 '{"error":"server_error","message":"Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
