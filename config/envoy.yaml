static_resources:
  listeners:
    - name: thor_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      per_connection_buffer_limit_bytes: 32768
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: thor_ingress
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: web_app
                            timeout: 30s
                            retry_policy:
                              retry_on: "gateway-error,connect-failure,refused-stream"
                              num_retries: 3
                              per_try_timeout: 10s
                http_filters:
                  - name: thor.waf
                    typed_config:
                      "@type": type.googleapis.com/thor.v3.WafConfig
                      rules_path: "/etc/thor/coraza-rules"
                      mode: "blocking"
                      audit_log: "/var/log/thor/audit.log"
                  
                  - name: thor.semantic
                    typed_config:
                      "@type": type.googleapis.com/thor.v3.SemanticConfig
                      model_path: "/opt/thor/models/semantic-v1.onnx"
                      threshold: 0.9
                      fallback_action: "allow"
                  
                  - name: thor.behavioral
                    typed_config:
                      "@type": type.googleapis.com/thor.v3.BehavioralConfig
                      redis_host: "redis-cluster"
                      redis_port: 6379
                      window_seconds: 3600
                      max_entries: 1000000
                  
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: web_app
      connect_timeout: 10s
      type: STRICT_DNS
      lb_policy: LEAST_REQUEST
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000
            max_pending_requests: 1000
            max_requests: 1000
            max_retries: 3
      health_checks:
        - timeout: 5s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/health"
      load_assignment:
        cluster_name: web_app
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 3000
    
    - name: thor_soc
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 100
            max_requests: 100
      outlier_detection:
        consecutive_5xx: 5
        interval: 30s
        base_ejection_time: 30s
      load_assignment:
        cluster_name: thor_soc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: thor-soc-1
                      port_value: 8081
              - endpoint:
                  address:
                    socket_address:
                      address: thor-soc-2
                      port_value: 8081

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

overload_manager:
  refresh_interval: 0.25s
  resource_monitors:
    - name: "envoy.resource_monitors.fixed_heap"
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
        max_heap_size_bytes: 2147483648
  actions:
    - name: "envoy.overload_actions.shrink_heap"
      triggers:
        - name: "envoy.resource_monitors.fixed_heap"
          threshold:
            value: 0.95
    - name: "envoy.overload_actions.stop_accepting_requests"
      triggers:
        - name: "envoy.resource_monitors.fixed_heap"
          threshold:
            value: 0.99
    
