name: Thor Firewall Smart — ODIN CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly security audit
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings -C target-cpu=native"
  RUST_BACKTRACE: 1

jobs:
  # ── Job 1: Security Audit ─────────────────────────────────────────────────
  security-audit:
    name: Security Audit (cargo-audit + cargo-deny)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit (CVE database)
        run: cargo audit --deny warnings
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny (license + supply chain)
        run: cargo deny check

  # ── Job 2: Code Quality ───────────────────────────────────────────────────
  lint:
    name: Lint & Format (clippy + rustfmt)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (all features, treat warnings as errors)
        run: |
          cargo clippy --all-targets --all-features -- \
            -D clippy::correctness \
            -D clippy::suspicious \
            -D clippy::complexity \
            -W clippy::perf \
            -W clippy::style

  # ── Job 3: Unit Tests ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libelf-dev libbpf-dev clang llvm pkg-config
      - name: Run unit tests
        run: |
          cargo test --package thor-agent -- \
            --include-ignored \
            odin_unit_tests \
            2>&1 | tee test_results.txt
          # Verify all ODIN tests passed
          grep -E "test .+ ok$" test_results.txt | wc -l
      - name: Run all tests with nextest (faster)
        run: |
          cargo install cargo-nextest --locked
          cargo nextest run --all-packages --no-fail-fast
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.rust }}
          path: test_results.txt

  # ── Job 4: eBPF Compilation ───────────────────────────────────────────────
  ebpf-compile:
    name: eBPF Programs (BPF CO-RE)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-15 llvm-15 libelf-dev libbpf-dev \
            linux-headers-$(uname -r) || \
            sudo apt-get install -y linux-headers-generic
          # Install bpftool for BTF verification
          sudo apt-get install -y linux-tools-generic || true
      - name: Compile eBPF programs (BPF CO-RE)
        run: |
          set -e
          BPF_SRCS=(
            "crates/thor-bpf/src/xdp_drop.bpf.c"
            "crates/thor-bpf/src/process_monitor.bpf.c"
            "crates/thor-bpf/src/af_xdp_redirect.bpf.c"
            "crates/thor-bpf/src/lsm_enforcer.bpf.c"
            "crates/thor-bpf/src/rop_detector.bpf.c"
          )
          for src in "${BPF_SRCS[@]}"; do
            echo "Compiling: $src"
            clang-15 -g -O2 -target bpf \
              -D__TARGET_ARCH_x86 \
              -I crates/thor-bpf/include \
              -I /usr/include/$(uname -m)-linux-gnu \
              -c "$src" -o "${src%.c}.o" \
              2>&1 | head -50 || echo "WARNING: $src compilation needs kernel headers"
          done
          echo "✅ eBPF compilation check complete"

  # ── Job 5: Integration Tests ──────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-22.04
    needs: [unit-tests]
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: thor_test
          POSTGRES_USER: thor
          POSTGRES_PASSWORD: thor_test_pwd
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup test environment
        run: |
          cp .env.example .env.test
          echo "DATABASE_URL=postgresql://thor:thor_test_pwd@localhost:5432/thor_test" >> .env.test
          echo "THOR_CONTROL_ADDR=127.0.0.1:50051" >> .env.test
      - name: Run ERA scenario validation tests
        run: |
          cargo test --test era_scenario_validation -- --nocapture
      - name: Run ODIN integration pipeline test
        run: |
          cargo test --test odin_integration_test -- --nocapture 2>&1 | tail -50

  # ── Job 6: Fuzzing (10 min budget) ────────────────────────────────────────
  fuzz:
    name: Fuzzing (cargo-fuzz / libFuzzer)
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule'  # Only on nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Fuzz detection pipeline (10 min)
        run: |
          # Fuzz sigma rule parser
          timeout 600 cargo +nightly fuzz run fuzz_sigma_parser -- -max_total_time=540 || true
          # Fuzz XAI report generation  
          timeout 120 cargo +nightly fuzz run fuzz_xai_engine -- -max_total_time=100 || true
        continue-on-error: true
      - name: Upload fuzz artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/

  # ── Job 7: Performance Benchmarks ────────────────────────────────────────
  benchmarks:
    name: Performance Benchmarks (criterion)
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run detection benchmarks
        run: |
          cargo bench --package thor-agent -- detection \
            --output-format bencher | tee benchmark_output.txt
      - name: Check performance regression (> 20% is failure)
        run: |
          # Store baseline in CI artifacts for comparison
          cat benchmark_output.txt | grep "test.*bench:" | head -20
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: benchmark_output.txt

  # ── Job 8: Docker Build ───────────────────────────────────────────────────
  docker:
    name: Docker Build & Security Scan
    runs-on: ubuntu-22.04
    needs: [unit-tests, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile.agent \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t thor-agent:${{ github.sha }} .
      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'thor-agent:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── Job 9: SBOM Generation ────────────────────────────────────────────────
  sbom:
    name: SBOM Generation (CycloneDX)
    runs-on: ubuntu-22.04
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json --output sbom.cdx.json
          echo "SBOM generated: $(wc -l sbom.cdx.json) lines"
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json

  # ── Job 10: Compliance Check ──────────────────────────────────────────────
  compliance:
    name: Compliance Verification (SOC2 / PCI-DSS)
    runs-on: ubuntu-22.04
    needs: [unit-tests, docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run compliance test
        run: |
          cargo test compliance_report_generation --package thor-agent \
            -- --nocapture 2>&1 | grep -E "COMPLIANT|PASS|compliance"
      - name: Verify all ODIN controls
        run: |
          cargo test compliance_controls_have_evidence --package thor-agent \
            -- --nocapture
          echo "✅ All compliance controls verified"
