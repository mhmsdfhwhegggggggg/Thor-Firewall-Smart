name: Thor Firewall CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Check + Test (non-eBPF code) ─────────────────────────────────────────
  check-and-test:
    name: Check & Test (Linux x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends             libssl-dev pkg-config libyara-dev

      - name: cargo check (workspace, skip eBPF crates)
        run: |
          cargo check             -p thor-common             -p thor-agent             -p thor-agent-net             -p thor-agent-web             -p thor-agent-srv             -p thor-soc-slm             -p thor-script             -p thor-ids

      - name: cargo test --lib (unit tests only, no kernel)
        run: |
          cargo test --lib             -p thor-common             -p thor-script             -p thor-ids             -- --nocapture

      - name: cargo clippy
        run: |
          cargo clippy             -p thor-common             -p thor-agent-net             -p thor-agent-web             -p thor-agent-srv             -- -D warnings -A clippy::too_many_arguments

      - name: cargo fmt check
        run: cargo fmt --all -- --check

  # ─── Audit dependencies ───────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit --deny warnings

  # ─── Cross-compile eBPF (on Linux kernel ≥ 5.4 host) ─────────────────────
  build-ebpf:
    name: Build eBPF Programs (bpf target)
    runs-on: ubuntu-latest
    continue-on-error: true  # eBPF build requires a privileged kernel — treated as informational

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly + bpf target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: bpfel-unknown-none

      - name: Install bpf-linker
        run: cargo install bpf-linker --locked

      - name: Build thor-xdp-ebpf (eBPF object)
        run: |
          cargo build             --package thor-xdp-ebpf             --target bpfel-unknown-none             -Z build-std=core             --release

  # ─── Docker image ─────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check-and-test

    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: thor-firewall:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
