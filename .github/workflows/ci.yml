# ═══════════════════════════════════════════════════════════════════════════════
# Thor Firewall Smart — Enhanced CI Pipeline (Phase 5)
# Stages: fmt → clippy → test → audit → docker-build → integration → staging
# ═══════════════════════════════════════════════════════════════════════════════
name: Thor CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Format Check ──────────────────────────────────────────────────────────
  fmt:
    name: Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all -- --check

  # ── 2. Clippy Lint (zero-warnings policy) ────────────────────────────────────
  clippy:
    name: Clippy Lint
    runs-on: ubuntu-22.04
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - name: Install eBPF build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r) \
            lld libyara-dev libssl-dev pkg-config
      - name: Clippy (deny all warnings)
        run: |
          cargo clippy --workspace \
            --exclude thor-bpf --exclude thor-xdp-ebpf \
            -- -D warnings \
               -A clippy::not_unsafe_ptr_arg_deref \
               -A dead_code \
               -A clippy::too_many_arguments

  # ── 3. Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-22.04
    needs: clippy
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thor_test
          POSTGRES_PASSWORD: thor_test_password
          POSTGRES_DB: thor_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r) \
            lld libyara-dev libssl-dev pkg-config
      - name: Run unit tests
        env:
          THOR_JWT_SECRET: "ci_test_secret_64_chars_long_padding_aaaaaaaaaaaaaaaaaaaaaaaaaaa"
          THOR_ADMIN_PASSWORD: "ci_test_admin_password_secure"
          DATABASE_URL: "postgres://thor_test:thor_test_password@localhost:5432/thor_test"
          REDIS_URL: "redis://localhost:6379"
        run: cargo test --workspace --lib -- --nocapture --test-threads=4
      - name: Run integration tests
        env:
          THOR_JWT_SECRET: "ci_test_secret_64_chars_long_padding_aaaaaaaaaaaaaaaaaaaaaaaaaaa"
          THOR_ADMIN_PASSWORD: "ci_test_admin_password_secure"
          DATABASE_URL: "postgres://thor_test:thor_test_password@localhost:5432/thor_test"
          REDIS_URL: "redis://localhost:6379"
        run: cargo test --workspace --test '*' -- --nocapture --test-threads=2
        continue-on-error: true

  # ── 4. Security Audit (CVE scan) ─────────────────────────────────────────────
  audit:
    name: Security Audit (CVE)
    runs-on: ubuntu-22.04
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Secret Detection (Gitleaks) ───────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 6. SBOM Generation ───────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-22.04
    needs: [test, audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --output thor-sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: thor-sbom
          path: thor-sbom.json

  # ── 7. Docker Build & Push ───────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-22.04
    needs: [test, audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      - name: Generate image attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true
        continue-on-error: true

  # ── 8. Helm Dry-Run (Kubernetes validation) ──────────────────────────────────
  helm-validate:
    name: Helm Dry-Run
    runs-on: ubuntu-22.04
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v3
        with: { version: "3.14.0" }
      - name: Setup kubectl (kind cluster)
        uses: helm/kind-action@v1.8.0
      - name: Helm lint
        run: |
          if [ -d helm/ ]; then
            helm lint helm/ --strict
          else
            echo "No helm chart found, skipping"
          fi
      - name: Kubectl apply dry-run
        run: |
          kubectl apply --dry-run=client -f k8s/ 2>&1 || true

  # ── 9. Performance Regression (k6) ──────────────────────────────────────────
  perf-test:
    name: Performance Regression (k6)
    runs-on: ubuntu-22.04
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      - name: Start thor-agent (mock mode)
        run: |
          docker run -d --name thor-test \
            -e THOR_JWT_SECRET="perf_test_secret_64chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa" \
            -e THOR_ADMIN_PASSWORD="perf_test_pass_ci" \
            -p 8080:8080 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} \
            --interface lo || echo "Starting without docker image"
          sleep 10
      - name: Run k6 performance test
        run: |
          if [ -f tests/perf/k6-smoke.js ]; then
            k6 run --vus 10 --duration 30s tests/perf/k6-smoke.js
          else
            echo "No k6 test found, creating smoke test"
            cat > /tmp/smoke.js << 'JSEOF'
import http from 'k6/http';
import { check, sleep } from 'k6';
export let options = { vus: 10, duration: '30s', thresholds: { http_req_duration: ['p(95)<500'] } };
export default function() {
  let r = http.get('http://localhost:8080/health');
  check(r, { 'status 200': (r) => r.status === 200 });
  sleep(1);
}
JSEOF
            k6 run /tmp/smoke.js || true
          fi
