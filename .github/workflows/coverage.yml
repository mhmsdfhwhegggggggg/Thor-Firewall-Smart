# ═══════════════════════════════════════════════════════════════════════════════
# Thor Firewall Smart — Code Coverage CI
# Uses cargo-llvm-cov for precise Rust coverage reporting
# Publishes to Codecov + generates HTML report as artifact
# ═══════════════════════════════════════════════════════════════════════════════
name: Coverage

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config libyara-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage (unit tests)
        run: |
          cargo llvm-cov \
            --lib \
            -p thor-common \
            -p thor-script \
            -p thor-ids \
            --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests|benches|build\.rs)' \
            -- --nocapture

      - name: Generate HTML report
        run: |
          cargo llvm-cov report --html --output-dir coverage-html \
            -p thor-common -p thor-script -p thor-ids

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          flags: unittests
          name: thor-firewall-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        run: |
          cargo llvm-cov report \
            -p thor-common -p thor-script -p thor-ids \
            --summary-only 2>&1 | tee coverage-summary.txt
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          cat coverage-summary.txt >> $GITHUB_STEP_SUMMARY

      - name: Coverage threshold check
        run: |
          # Fail if overall coverage drops below 60%
          COVERAGE=$(cargo llvm-cov report \
            -p thor-common -p thor-script -p thor-ids \
            --summary-only 2>/dev/null | \
            grep -oP 'TOTAL.*?\K[\d.]+(?=%)' | tail -1)
          echo "Coverage: ${COVERAGE}%"
          python3 -c "
          cov = float('${COVERAGE}' or 0)
          if cov < 60:
              print(f'FAIL: Coverage {cov}% is below threshold 60%')
              exit(1)
          print(f'PASS: Coverage {cov}% meets threshold 60%')
          "
