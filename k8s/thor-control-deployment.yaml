apiVersion: apps/v1
kind: Deployment
metadata:
  name: thor-control-plane
  namespace: thor-security
spec:
  replicas: 3 # تشغيل 3 نسخ لضمان التوافر العالي
  selector:
    matchLabels:
      app: thor-control
  strategy:
    type: RollingUpdate # تحديث بدون توقف (Zero-Downtime)
  template:
    metadata:
      labels:
        app: thor-control
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - thor-control
              topologyKey: "kubernetes.io/hostname" # ضمان توزيع النسخ على خوادم فيزيائية مختلفة
      containers:
        - name: thor-control
          image: your-registry/thor-control:latest
          ports:
            - containerPort: 50051 # gRPC
            - containerPort: 8080  # REST
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi" # منع استهلاك الذاكرة الجامح
              cpu: "500m"
          readinessProbe: # التأكد من أن الخادم جاهز لاستقبال حركة المرور
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe: # إعادة تشغيل الحاوية إذا علقت
            grpc:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: thor-control-service
  namespace: thor-security
spec:
  selector:
    app: thor-control
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: rest
      port: 8080
      targetPort: 8080
  type: ClusterIP # أو LoadBalancer حسب بنية البنك
