# ═══════════════════════════════════════════════════════════════════════════════
# Thor Firewall Smart — Horizontal Pod Autoscalers
# ═══════════════════════════════════════════════════════════════════════════════
# Requirements: metrics-server installed in cluster
# Apply: kubectl apply -f k8s/thor-hpa.yaml
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: thor-agent-web-hpa
  namespace: thor-firewall
  labels:
    app.kubernetes.io/name: thor-agent-web
    app.kubernetes.io/part-of: thor-firewall
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: thor-agent-web
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 5
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: thor-soc-slm-hpa
  namespace: thor-firewall
  labels:
    app.kubernetes.io/name: thor-soc-slm
    app.kubernetes.io/part-of: thor-firewall
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: thor-soc-slm
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: thor-agent-srv-hpa
  namespace: thor-firewall
  labels:
    app.kubernetes.io/name: thor-agent-srv
    app.kubernetes.io/part-of: thor-firewall
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: thor-agent-srv
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
