---
# ─── Ingress: TLS termination via cert-manager ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thor-api
  namespace: thor-firewall
  annotations:
    # cert-manager: auto-provision Let's Encrypt or internal CA cert
    cert-manager.io/cluster-issuer: "thor-internal-ca"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "on"
    nginx.ingress.kubernetes.io/proxy-ssl-secret: "thor-firewall/thor-tls-certs"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'";
      more_set_headers "Permissions-Policy: geolocation=(), camera=(), microphone=()";
    # Rate limiting at ingress level (defense in depth)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - thor.security.internal
      secretName: thor-tls-certs
  rules:
    - host: thor.security.internal
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: thor-agent
                port:
                  name: api-tls
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: thor-agent
                port:
                  name: api-tls
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: thor-agent
                port:
                  name: metrics
          - path: /health
            pathType: Exact
            backend:
              service:
                name: thor-agent
                port:
                  name: api

---
# ─── cert-manager ClusterIssuer (internal CA) ─────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: thor-internal-ca
spec:
  ca:
    secretName: thor-root-ca-secret

---
# ─── Certificate for thor-agent mTLS ─────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: thor-agent-cert
  namespace: thor-firewall
spec:
  secretName: thor-tls-certs
  duration: 8760h     # 1 year
  renewBefore: 720h   # renew 30 days before expiry
  subject:
    organizations: ["Thor Security"]
    organizationalUnits: ["Network Security"]
  commonName: thor-agent.thor-firewall.svc.cluster.local
  dnsNames:
    - thor-agent
    - thor-agent.thor-firewall
    - thor-agent.thor-firewall.svc
    - thor-agent.thor-firewall.svc.cluster.local
    - thor.security.internal
  usages:
    - server auth
    - client auth
  issuerRef:
    name: thor-internal-ca
    kind: ClusterIssuer
