---
# ════════════════════════════════════════════════════════════════════════════════
# ⚠️  TEMPLATE ONLY — DO NOT COMMIT ACTUAL VALUES
# Use kubectl create secret or a secrets manager (Vault / AWS Secrets Manager).
# Replace all <CHANGE_ME_*> values before deploying.
# ════════════════════════════════════════════════════════════════════════════════
#
# To create secrets properly:
#
#   kubectl create secret generic thor-secrets \
#     --namespace thor-firewall \
#     --from-literal=jwt-secret="$(openssl rand -hex 64)" \
#     --from-literal=admin-username="thor_admin" \
#     --from-literal=admin-password="$(openssl rand -base64 32)" \
#     --from-literal=db-password="$(openssl rand -base64 32)" \
#     --from-literal=redis-password="$(openssl rand -base64 32)" \
#     --from-literal=database-url="postgresql://thor_user:<DB_PASS>@postgres:5432/thor" \
#     --from-literal=redis-url="redis://:$(REDIS_PASS)@redis-0.redis.thor-firewall.svc.cluster.local:6379"
#
# To use HashiCorp Vault instead (recommended for production):
#   See: https://developer.hashicorp.com/vault/docs/platform/k8s/csi
#
# To use AWS Secrets Manager instead:
#   See: https://docs.aws.amazon.com/secretsmanager/latest/userguide/integrating_csi_driver.html

apiVersion: v1
kind: Secret
metadata:
  name: thor-secrets
  namespace: thor-firewall
  annotations:
    # Managed by: Vault / AWS Secrets Manager / Azure Key Vault
    # Rotation policy: every 90 days
    "secret-rotation/enabled": "true"
    "secret-rotation/interval": "90d"
type: Opaque
stringData:
  jwt-secret:       "<CHANGE_ME_64_CHAR_HEX_openssl_rand_-hex_64>"
  admin-username:   "<CHANGE_ME_admin_username>"
  admin-password:   "<CHANGE_ME_strong_password_min_32_chars>"
  db-password:      "<CHANGE_ME_db_password>"
  redis-password:   "<CHANGE_ME_redis_password>"
  database-url:     "postgresql://thor_user:<CHANGE_ME>@postgres:5432/thor?sslmode=require"
  redis-url:        "rediss://:CHANGE_ME@redis-0.redis.thor-firewall:6379"
  kafka-api-key:    "<CHANGE_ME_if_using_managed_kafka>"
  siem-api-key:     "<CHANGE_ME_splunk_or_qradar_token>"
  otx-api-key:      "<CHANGE_ME_alienvault_otx_key>"
  vt-api-key:       "<CHANGE_ME_virustotal_key>"
