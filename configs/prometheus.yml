# Prometheus scrape configuration for Thor Firewall Smart (Phase 2)
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: thor-dev
    environment: development

rule_files:
  - "rules/thor-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: thor-agent-1
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["thor-agent-1:9090"]
        labels:
          agent: thor-agent-1

  - job_name: thor-agent-2
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["thor-agent-2:9091"]
        labels:
          agent: thor-agent-2

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
